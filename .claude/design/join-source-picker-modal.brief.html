<!DOCTYPE html>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e10; --panel: #141416; --panel-2: #1a1a1d; --panel-3: #202024;
    --border: rgba(255,255,255,0.08); --border-soft: rgba(255,255,255,0.04); --hover: rgba(255,255,255,0.06);
    --text: #f0f0f2; --text-2: #a0a0aa; --text-3: #6a6a74; --text-4: #3a3a42;
    --good: #34d399; --bad: #f87171; --warn: #fbbf24; --run: #60a5fa;
    --accent: #7c6cf5; --accent-soft: rgba(124,108,245,0.12); --accent-line: rgba(124,108,245,0.4); --accent-ink: #fff;
    --check: #60a5fa; --check-bg: rgba(96,165,250,0.1); --xform: #fbbf24; --xform-bg: rgba(251,191,36,0.1);
    --radius: 6px; --radius-lg: 10px;
    font-family: 'Geist', system-ui, sans-serif;
    font-size: 14px;
  }

  body { background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; line-height: 1.5; }

  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.16); }

  .mono { font-family: 'Geist Mono', ui-monospace, monospace; }

  body::before {
    content: ""; position: fixed; inset: 0 0 auto 0; height: 2px; z-index: 50;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: .5;
  }

  @keyframes joinFade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes joinSlide { from { transform: translateX(28px); } to { transform: translateX(0); } }
  @media (prefers-reduced-motion: reduce) {
    .join-anim { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react" src="tweaks-panel.jsx"></script>

<script type="text/babel" data-presets="react">
const { useState, useRef, useEffect } = React;

/* ──────────────────────────────────────────────────────────────────────────
   PRIMITIVES — lifted verbatim from ui.jsx so every mock renders the REAL
   components with the REAL tokens. ICONS extended with join/search/back —
   join + search are NEW glyphs this issue adds to ICONS (see Spec 6).
   ────────────────────────────────────────────────────────────────────────── */
const ICONS = {
  close:    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="m5 5 10 10M15 5 5 15"/></svg>,
  check:    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="2"><path d="m4 10 4.5 4.5L16 6"/></svg>,
  warn:     <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M10 3 2 17h16L10 3z"/><path d="M10 8v4M10 14v.5"/></svg>,
  chevron:  <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="m7 8 3 3 3-3"/></svg>,
  drag:     <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="7.5" cy="6" r="1"/><circle cx="12.5" cy="6" r="1"/><circle cx="7.5" cy="10" r="1"/><circle cx="12.5" cy="10" r="1"/><circle cx="7.5" cy="14" r="1"/><circle cx="12.5" cy="14" r="1"/></svg>,
  back:     <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M11 5 6 10l5 5M6 10h9"/></svg>,
  search:   <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="9" cy="9" r="5.5"/><path d="m13.5 13.5 3 3"/></svg>,
  join:     <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="7.5" cy="10" r="5"/><circle cx="12.5" cy="10" r="5"/></svg>,
  plus:     <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M10 4v12M4 10h12"/></svg>,
};
function Icon({ name, size = 16, style }) {
  const svg = ICONS[name]; if (!svg) return null;
  return <span style={{ display: "inline-flex", alignItems: "center", width: size, height: size, flexShrink: 0, ...style }}>{React.cloneElement(svg, { width: size, height: size })}</span>;
}
function Btn({ children, variant = "default", size = "md", icon, onClick, disabled, style }) {
  const base = { display: "inline-flex", alignItems: "center", gap: 6, cursor: disabled ? "not-allowed" : "pointer", border: "1px solid", borderRadius: "var(--radius)", fontWeight: 500, transition: "opacity .15s", opacity: disabled ? 0.45 : 1, whiteSpace: "nowrap" };
  const sizes = { sm: { padding: "3px 10px", fontSize: 12 }, md: { padding: "6px 14px", fontSize: 13 }, lg: { padding: "9px 18px", fontSize: 14 } };
  const variants = { default: { background: "var(--panel-3)", borderColor: "var(--border)", color: "var(--text-2)" }, primary: { background: "var(--accent)", borderColor: "transparent", color: "var(--accent-ink)" }, ghost: { background: "transparent", borderColor: "transparent", color: "var(--text-2)" } };
  return <button type="button" style={{ ...base, ...sizes[size], ...variants[variant], ...style }} onClick={onClick} disabled={disabled}>{icon && <Icon name={icon} size={14} />}{children}</button>;
}
function SourceBadge({ name, style }) {
  const initials = name.slice(0, 2).toUpperCase();
  const hue = [...name].reduce((h, c) => h + c.charCodeAt(0), 0) % 360;
  return <span style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: 28, height: 28, borderRadius: "var(--radius)", background: `hsl(${hue},50%,22%)`, color: `hsl(${hue},70%,70%)`, fontSize: 11, fontWeight: 700, flexShrink: 0, ...style }}>{initials}</span>;
}
function Spinner({ size = 14, color = "currentColor", strokeWidth = 2 }) {
  const c = size / 2, r = (size - strokeWidth) / 2, circ = 2 * Math.PI * r;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ flexShrink: 0, display: "block" }} role="status" aria-label="Loading">
      <circle cx={c} cy={c} r={r} fill="none" stroke={color} strokeOpacity={0.22} strokeWidth={strokeWidth} />
      <circle cx={c} cy={c} r={r} fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeDasharray={`${circ * 0.3} ${circ}`}>
        <animateTransform attributeName="transform" type="rotate" from={`0 ${c} ${c}`} to={`360 ${c} ${c}`} dur="0.7s" repeatCount="indefinite" />
      </circle>
    </svg>
  );
}

/* ──────────────────────────────────────────────────────────────────────────
   THE TWO PROPOSED ui.jsx PRIMITIVES — rendered live, exactly as specced
   ────────────────────────────────────────────────────────────────────────── */

/* Switch — token-native toggle. Replaces any ad-hoc on/off control. */
function Switch({ checked, onChange, disabled, size = 16 }) {
  const w = size * 1.75, pad = 2, knob = size - pad * 2;
  return (
    <span
      role="switch" aria-checked={checked} tabIndex={disabled ? -1 : 0}
      onClick={() => !disabled && onChange && onChange(!checked)}
      onKeyDown={e => { if ((e.key === " " || e.key === "Enter") && !disabled) { e.preventDefault(); onChange && onChange(!checked); } }}
      style={{
        width: w, height: size, flexShrink: 0, borderRadius: 99, position: "relative", cursor: disabled ? "not-allowed" : "pointer",
        background: checked ? "var(--accent)" : "var(--panel-3)",
        border: "1px solid " + (checked ? "transparent" : "var(--border)"),
        opacity: disabled ? 0.45 : 1, transition: "background .16s, border-color .16s", display: "inline-block", verticalAlign: "middle",
      }}
    >
      <span style={{
        position: "absolute", top: pad - 1, left: checked ? w - knob - pad - 1 : pad - 1,
        width: knob, height: knob, borderRadius: 99,
        background: checked ? "var(--accent-ink)" : "var(--text-3)",
        transition: "left .16s",
      }} />
    </span>
  );
}

/* Modal — first true overlay primitive. Generalises the inline modal chrome
   already duplicated across RegisterModal / IngestModal / MigrationConfirmModal. */
function Modal({ open, onClose, title, icon, caption, width = 420, footer, children, headerExtra }) {
  useEffect(() => {
    if (!open) return;
    const onKey = e => { if (e.key === "Escape") onClose && onClose(); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [open, onClose]);
  if (!open) return null;
  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.55)", zIndex: 200, display: "flex", alignItems: "center", justifyContent: "center" }}>
      <div onClick={e => e.stopPropagation()} style={{ background: "var(--panel)", border: "1px solid var(--border)", borderRadius: "var(--radius-lg)", width, maxWidth: "calc(100vw - 32px)", boxShadow: "0 16px 48px rgba(0,0,0,.6)", display: "flex", flexDirection: "column", overflow: "hidden" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "16px 20px", borderBottom: "1px solid var(--border)" }}>
          {icon && <Icon name={icon} size={18} style={{ color: "var(--accent)" }} />}
          <span style={{ fontWeight: 600, fontSize: 15 }}>{title}</span>
          {caption && <span style={{ fontSize: 12, color: "var(--text-3)" }}>{caption}</span>}
          {headerExtra}
          <button onClick={onClose} title="Close" style={{ marginLeft: "auto", background: "none", border: "none", cursor: "pointer", color: "var(--text-4)", padding: 2, lineHeight: 0 }}><Icon name="close" size={16} /></button>
        </div>
        <div style={{ padding: 20 }}>{children}</div>
        {footer && <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "14px 20px", borderTop: "1px solid var(--border)" }}>{footer}</div>}
      </div>
    </div>
  );
}

/* ──────────────────────────────────────────────────────────────────────────
   DOC CHROME — identical kit to the Builder-Step-Cards & Function-Drawer briefs
   ────────────────────────────────────────────────────────────────────────── */
function Eyebrow({ children, color = "var(--accent)" }) {
  return <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: ".14em", textTransform: "uppercase", color }}>{children}</div>;
}
function SubHead({ children }) {
  return <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: ".08em", textTransform: "uppercase", color: "var(--text-3)", marginBottom: 12 }}>{children}</div>;
}
function Card({ children, style }) {
  return <div style={{ background: "var(--panel)", border: "1px solid var(--border)", borderRadius: "var(--radius-lg)", padding: 24, display: "flex", flexDirection: "column", gap: 20, ...style }}>{children}</div>;
}
function Block({ children, style }) {
  return <div style={{ display: "flex", flexDirection: "column", gap: 12, ...style }}>{children}</div>;
}
function Section({ id, children }) {
  return <section id={id} style={{ display: "flex", flexDirection: "column", gap: 20, scrollMarginTop: 24 }}>{children}</section>;
}
function SectionHead({ kicker, title, children }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
      <Eyebrow>{kicker}</Eyebrow>
      <h2 style={{ fontSize: 23, fontWeight: 600, letterSpacing: "-.01em" }}>{title}</h2>
      {children && <p style={{ fontSize: 14, color: "var(--text-2)", maxWidth: 760, lineHeight: 1.6 }}>{children}</p>}
    </div>
  );
}
function M({ children }) { return <span className="mono" style={{ color: "var(--text)" }}>{children}</span>; }

function Diff({ rows, file = "screen-builder.jsx" }) {
  return (
    <div style={{ border: "1px solid var(--border)", borderRadius: "var(--radius)", overflow: "hidden", background: "#0a0a0c" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 7, padding: "7px 12px", borderBottom: "1px solid var(--border-soft)", background: "var(--panel-2)" }}>
        <span style={{ width: 8, height: 8, borderRadius: 99, background: "var(--text-4)" }} />
        <span className="mono" style={{ fontSize: 11, color: "var(--text-3)" }}>{file}</span>
      </div>
      {rows.map(([sign, ln], i) => {
        const bg = sign === "-" ? "rgba(248,113,113,.06)" : sign === "+" ? "rgba(52,211,153,.06)" : "transparent";
        const mk = sign === "-" ? "var(--bad)" : sign === "+" ? "var(--good)" : "var(--text-4)";
        return (
          <div key={i} className="mono" style={{ display: "flex", fontSize: 12, lineHeight: 1.6, background: bg }}>
            <span style={{ width: 22, textAlign: "center", color: mk, flexShrink: 0, userSelect: "none", opacity: .8 }}>{sign === " " ? "" : sign}</span>
            <span style={{ color: ln.trimStart().startsWith("//") ? "var(--text-4)" : "var(--text-2)", whiteSpace: "pre-wrap", paddingRight: 12 }}>{ln}</span>
          </div>
        );
      })}
    </div>
  );
}
function PropsTable({ head = ["Prop", "Type", "Default", "Notes"], rows }) {
  return (
    <div style={{ overflowX: "auto" }}>
      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
        <thead><tr>{head.map(h => <th key={h} style={{ padding: "7px 12px", textAlign: "left", color: "var(--text-3)", fontWeight: 500, fontSize: 10.5, letterSpacing: ".06em", textTransform: "uppercase", borderBottom: "1px solid var(--border)", whiteSpace: "nowrap" }}>{h}</th>)}</tr></thead>
        <tbody>
          {rows.map((r, i) => (
            <tr key={i} style={{ borderBottom: "1px solid var(--border-soft)" }}>
              {r.map((cell, j) => <td key={j} className={j < 3 ? "mono" : ""} style={{ padding: "8px 12px", fontSize: j < 3 ? 12.5 : 13, color: j === 0 ? "var(--accent)" : j === 1 ? "var(--good)" : j === 2 ? "var(--text-3)" : "var(--text-2)", whiteSpace: j === 3 ? "normal" : "nowrap", verticalAlign: "top" }}>{cell}</td>)}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}
function TokenChip({ t, note }) {
  return (
    <span className="mono" style={{ display: "inline-flex", alignItems: "center", gap: 7, padding: "3px 10px", borderRadius: 99, background: "var(--panel-3)", border: "1px solid var(--border)", fontSize: 11, color: "var(--text-2)" }}>
      <span style={{ width: 10, height: 10, borderRadius: 3, background: `var(${t})`, border: "1px solid rgba(255,255,255,.14)" }} />{t}{note && <span style={{ color: "var(--text-4)" }}>· {note}</span>}
    </span>
  );
}
function Note({ n, children }) {
  return (
    <div style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
      <span style={{ flexShrink: 0, width: 18, height: 18, borderRadius: 99, background: "var(--accent-soft)", border: "1px solid var(--accent-line)", color: "var(--accent)", fontSize: 10, fontWeight: 700, display: "inline-flex", alignItems: "center", justifyContent: "center", marginTop: 1 }}>{n}</span>
      <span style={{ fontSize: 13, color: "var(--text-2)", lineHeight: 1.6 }}>{children}</span>
    </div>
  );
}
function GoodBad({ items, kind }) {
  return (
    <Card style={{ padding: 20, gap: 12 }}>
      <SubHead>{kind === "good" ? "What the design does" : "Why a new flow"}</SubHead>
      {items.map((t, i) => (
        <div key={i} style={{ display: "flex", gap: 9, alignItems: "flex-start" }}>
          <Icon name={kind === "good" ? "check" : "warn"} size={13} style={{ color: kind === "good" ? "var(--good)" : "var(--warn)", marginTop: 2 }} />
          <span style={{ fontSize: 12.5, color: "var(--text-2)", lineHeight: 1.55 }}>{t}</span>
        </div>
      ))}
    </Card>
  );
}

/* ──────────────────────────────────────────────────────────────────────────
   MOCK DOMAIN DATA — faithful to the source/column registry shapes
   ────────────────────────────────────────────────────────────────────────── */
const CURRENT = { id: "src-rev", name: "Monthly Revenue" };
const SOURCES = [
  { id: "src-sf",  name: "Salesforce Opps",  rows: 12480, cols: 18, steps: 3 },
  { id: "src-str", name: "Stripe Charges",   rows: 8201,  cols: 11, steps: 0 },
  { id: "src-hs",  name: "HubSpot Contacts", rows: 5932,  cols: 22, steps: 2 },
  { id: "src-reg", name: "Region Lookup",    rows: 54,    cols: 3,  steps: 0 },
];
const LEFT_COLS = [
  { id: "l1", name: "account_id", type: "str" },
  { id: "l2", name: "amount", type: "float" },
  { id: "l3", name: "close_date", type: "date" },
  { id: "l4", name: "region_code", type: "str" },
  { id: "l5", name: "stage", type: "str" },
];
const RIGHT_RAW = [
  { id: "r1", name: "opp_id", type: "str" },
  { id: "r2", name: "account_id", type: "str" },
  { id: "r3", name: "owner", type: "str" },

const RIGHT_XFORM = [
  ...RIGHT_RAW,
  { id: "r6", name: "arr_usd", type: "float" },
  { id: "r7", name: "is_won", type: "bool" },
];
const JOIN_TYPES = [
  { id: "inner", label: "Inner", hint: "Only rows that match in both." },
  { id: "left",  label: "Left",  hint: "All left rows; nulls where no match." },
  { id: "right", label: "Right", hint: "All right rows; nulls where no match." },
  { id: "full",  label: "Full",  hint: "All rows from both sides." },
];

function fmt(n) { return n.toLocaleString(); }

/* ── type badge used in every column row ── */
function TypeChip({ t }) {
  return <span className="mono" style={{ fontSize: 9.5, padding: "1px 6px", borderRadius: 99, background: "var(--panel-3)", color: "var(--text-3)", flexShrink: 0 }}>{t}</span>;
}

/* ──────────────────────────────────────────────────────────────────────────
   PALETTE CARDS — Spec 1
   ────────────────────────────────────────────────────────────────────────── */

/* Shared shell — the hover/drag highlight (border → --accent-line, fill →
   --accent-soft, plus the accent left-strip) is common to EVERY palette card.
   Borders are all-longhand and the strip is an inset box-shadow, so nothing
   conflicts or changes width on hover — it animates cleanly instead of flashing.
   Built-ins pass accentEdge to pin the strip on permanently. */
function PaletteCardShell({ accentEdge, dragging, onDragStart, children }) {
  const [hover, setHover] = useState(false);
  const active = hover || dragging;
  const bc = active ? "var(--accent-line)" : "var(--border)";
  const strip = accentEdge || active;
  return (
    <div
      draggable onDragStart={onDragStart}
      onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      style={{
        padding: "8px 11px", borderRadius: "var(--radius)",
        borderTop: "1px solid " + bc, borderRight: "1px solid " + bc,
        borderBottom: "1px solid " + bc, borderLeft: "1px solid " + bc,
        boxShadow: strip ? "inset 2px 0 0 0 var(--accent)" : "inset 0 0 0 0 var(--accent)",
        background: active ? "var(--accent-soft)" : "var(--panel)",
        cursor: "grab", display: "flex", flexDirection: "column", gap: 3,
        transition: "border-color .12s, background .12s, box-shadow .12s",
        opacity: dragging ? 0.55 : 1,
      }}
    >
      {children}
    </div>
  );
}

function PaletteFunctionCard({ name, cls, doc, dragging }) {
  return (
    <PaletteCardShell dragging={dragging}>
      <div style={{ fontSize: 12, fontWeight: 600, color: "var(--text)" }}>{name}</div>
      <div style={{ display: "flex", gap: 4 }}>
        <span className="mono" style={{ fontSize: 10, padding: "1px 5px", borderRadius: 99, background: "var(--panel-3)", color: "var(--text-3)" }}>{cls}</span>
      </div>
      {doc && <div style={{ fontSize: 10, color: "var(--text-4)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{doc}</div>}
    </PaletteCardShell>
  );
}

/* AFTER — built-in card: no icon. Same shared highlight + an accent left-edge
   and "built-in" tag set it apart. */
function PaletteBuiltinCard({ name, doc, dragging }) {
  return (
    <PaletteCardShell accentEdge dragging={dragging}>
      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
        <span style={{ fontSize: 12, fontWeight: 600, color: "var(--text)" }}>{name}</span>
        <span className="mono" style={{ fontSize: 9, fontWeight: 600, letterSpacing: ".04em", textTransform: "uppercase", padding: "1px 5px", borderRadius: 99, background: "var(--accent-soft)", color: "var(--accent)", border: "1px solid var(--accent-line)" }}>built-in</span>
      </div>
      {doc && <div style={{ fontSize: 10, color: "var(--text-4)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{doc}</div>}
    </PaletteCardShell>
  );
}

/* mini palette with the three tabs, Built-ins active */
function PaletteMock() {
  const [tab, setTab] = useState("builtins");
  const tabStyle = t => ({ flex: 1, padding: "6px 0", fontSize: 11, fontWeight: 600, background: "none", border: "none", borderBottom: tab === t ? "2px solid var(--accent)" : "2px solid transparent", color: tab === t ? "var(--accent)" : "var(--text-3)", cursor: "pointer", letterSpacing: ".03em" });
  return (
    <div style={{ width: 230, border: "1px solid var(--border)", borderRadius: "var(--radius-lg)", overflow: "hidden", background: "var(--bg)" }}>
      <div style={{ display: "flex", borderBottom: "1px solid var(--border)" }}>
        <button style={tabStyle("functions")} onClick={() => setTab("functions")}>Functions</button>
        <button style={tabStyle("builtins")} onClick={() => setTab("builtins")}>Built-ins</button>
        <button style={tabStyle("sets")} onClick={() => setTab("sets")}>Sets</button>
      </div>
      <div style={{ padding: 10, display: "flex", flexDirection: "column", gap: 6, minHeight: 168 }}>
        {tab === "functions" && <>
          <PaletteFunctionCard name="flag_negative_amount" cls="pd.Series" doc="Flag rows where amount < 0" />
          <PaletteFunctionCard name="to_usd" cls="pd.Series" doc="Convert to USD" />
        </>}
        {tab === "builtins" && <>
          <PaletteBuiltinCard name="Join" doc="Merge another report on matching keys" />
          <PaletteBuiltinCard name="Pivot" doc="Reshape rows into columns" />
        </>}
        {tab === "sets" && <div style={{ fontSize: 11, color: "var(--text-4)", textAlign: "center", paddingTop: 28 }}>No function sets.</div>}
      </div>
    </div>
  );
}

/* ──────────────────────────────────────────────────────────────────────────
   STEP-1 ROW — source picker
   ────────────────────────────────────────────────────────────────────────── */
function SourceRow({ src, selected, onSelect, useXform, onToggleXform }) {
  const hasPipeline = src.steps > 0;
  return (
    <div
      onClick={onSelect}
      style={{
        display: "flex", alignItems: "center", gap: 11, padding: "10px 12px",
        borderRadius: "var(--radius)", cursor: "pointer",
        background: selected ? "var(--accent-soft)" : "var(--panel-2)",
        border: "1px solid " + (selected ? "var(--accent)" : "var(--border)"),
        transition: "background .12s, border-color .12s",
      }}
    >
      <SourceBadge name={src.name} />
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 13, fontWeight: selected ? 600 : 500, color: selected ? "var(--accent)" : "var(--text)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{src.name}</div>
        <div className="mono" style={{ fontSize: 10.5, color: "var(--text-4)", marginTop: 2 }}>
          {fmt(src.rows)} rows · {src.cols} cols{hasPipeline ? ` · ${src.steps} pipeline step${src.steps !== 1 ? "s" : ""}` : ""}
        </div>
      </div>
      {hasPipeline && (
        <div onClick={e => e.stopPropagation()} style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 3, flexShrink: 0 }}>
          <Switch checked={useXform} onChange={onToggleXform} />
          <span style={{ fontSize: 9.5, color: useXform ? "var(--accent)" : "var(--text-4)", letterSpacing: ".02em" }}>{useXform ? "transformed" : "raw columns"}</span>
        </div>
      )}
    </div>
  );
}

/* ──────────────────────────────────────────────────────────────────────────
   STEP-2 — searchable single-select column list + join-type selector
   ────────────────────────────────────────────────────────────────────────── */
function ColumnSelectList({ label, columns, value, onChange, loading, maxH = 168 }) {
  const [q, setQ] = useState("");
  const filtered = columns.filter(c => c.name.toLowerCase().includes(q.toLowerCase()));
  return (
    <div style={{ flex: 1, minWidth: 0, display: "flex", flexDirection: "column", gap: 7 }}>
      {label && <span style={{ fontSize: 11, fontWeight: 600, color: "var(--text-2)" }}>{label}</span>}
      <div style={{ display: "flex", alignItems: "center", gap: 6, padding: "5px 9px", borderRadius: "var(--radius)", background: "var(--panel-2)", border: "1px solid var(--border)" }}>
        <Icon name="search" size={13} style={{ color: "var(--text-4)" }} />
        <input value={q} onChange={e => setQ(e.target.value)} placeholder="Filter columns…" style={{ flex: 1, background: "none", border: "none", outline: "none", color: "var(--text)", fontSize: 12 }} />
      </div>
      <div style={{ border: "1px solid var(--border)", borderRadius: "var(--radius)", background: "var(--panel-2)", maxHeight: maxH, overflowY: "auto", display: "flex", flexDirection: "column" }}>
        {loading ? (
          <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, padding: "30px 0", color: "var(--text-4)", fontSize: 12 }}>
            <Spinner size={14} /> Loading columns…
          </div>
        ) : filtered.length === 0 ? (
          <div style={{ padding: "26px 0", textAlign: "center", color: "var(--text-4)", fontSize: 11.5 }}>No columns match.</div>
        ) : filtered.map(col => {
          const sel = value === col.id;
          return (
            <div key={col.id} onClick={() => onChange(col.id)}
              style={{ display: "flex", alignItems: "center", gap: 8, padding: "7px 10px", cursor: "pointer", borderBottom: "1px solid var(--border-soft)",
                background: sel ? "var(--accent-soft)" : "transparent", transition: "background .1s" }}>
              <span style={{ width: 13, height: 13, flexShrink: 0, borderRadius: 99, border: "1px solid " + (sel ? "var(--accent)" : "var(--border)"), background: sel ? "var(--accent)" : "transparent", display: "inline-flex", alignItems: "center", justifyContent: "center" }}>
                {sel && <span style={{ width: 5, height: 5, borderRadius: 99, background: "var(--accent-ink)" }} />}
              </span>
              <span className="mono" style={{ fontSize: 11.5, flex: 1, color: sel ? "var(--accent)" : "var(--text)", fontWeight: sel ? 600 : 400, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{col.name}</span>
              <TypeChip t={col.type} />
            </div>
          );
        })}
      </div>
    </div>
  );
}

function JoinTypeSelect({ value, onChange }) {
  const active = JOIN_TYPES.find(j => j.id === value);
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 7 }}>
      <span style={{ fontSize: 11, fontWeight: 600, color: "var(--text-2)" }}>Join type</span>
      <div style={{ display: "flex", gap: 4, background: "var(--panel-2)", border: "1px solid var(--border)", borderRadius: "var(--radius)", padding: 3 }}>
        {JOIN_TYPES.map(j => {
          const sel = j.id === value;
          return (
            <button key={j.id} onClick={() => onChange(j.id)} style={{
              flex: 1, padding: "5px 0", fontSize: 11.5, fontWeight: 600, borderRadius: 4, border: "none", cursor: "pointer",
              background: sel ? "var(--accent)" : "transparent", color: sel ? "var(--accent-ink)" : "var(--text-3)", transition: "background .12s, color .12s",
            }}>{j.label}</button>
          );
        })}
      </div>
      <span style={{ fontSize: 10.5, color: "var(--text-4)" }}>{active ? active.hint : ""}</span>
    </div>
  );
}

/* ──────────────────────────────────────────────────────────────────────────
   KEY-PAIR BUILDER — Step 2. Composite-ready: a stack of left=right key rows.
   ────────────────────────────────────────────────────────────────────────── */
function KeyPairBuilder({ leftCols, rightCols, leftName, rightName, keys, onChange, loading }) {
  const update = (i, side, id) => onChange(keys.map((k, j) => j === i ? { ...k, [side]: id } : k));
  const add = () => onChange([...keys, { left: null, right: null }]);
  const remove = (i) => onChange(keys.filter((_, j) => j !== i));
  const composite = keys.length > 1;
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
      <div style={{ display: "flex", alignItems: "baseline", gap: 8, flexWrap: "wrap" }}>
        <span style={{ fontSize: 12.5, fontWeight: 600, color: "var(--text)" }}>Match keys</span>
        <span style={{ fontSize: 11, color: "var(--text-3)" }}>Rows match where {composite ? "every" : "the"} left value equals its paired right value.</span>
      </div>
      {keys.map((k, i) => (
        <div key={i} style={{ display: "flex", flexDirection: "column", gap: 7,
          padding: composite ? 10 : 0, borderRadius: "var(--radius)",
          border: composite ? "1px solid var(--border)" : "none",
          background: composite ? "var(--panel-2)" : "transparent" }}>
          {composite && (
            <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
              <span className="mono" style={{ fontSize: 9.5, fontWeight: 600, textTransform: "uppercase", letterSpacing: ".06em", color: "var(--text-3)", padding: "1px 6px", borderRadius: 99, background: "var(--panel-3)" }}>key {i + 1}</span>
              <span style={{ flex: 1 }} />
              <button onClick={() => remove(i)} title="Remove key" style={{ background: "none", border: "none", cursor: "pointer", color: "var(--text-4)", fontSize: 14, lineHeight: 1, padding: 2 }}>✕</button>
            </div>
          )}
          <div style={{ display: "flex", alignItems: "flex-start", gap: 10 }}>
            <ColumnSelectList label={i === 0 ? "Left · " + leftName : ""} columns={leftCols} value={k.left} onChange={id => update(i, "left", id)} loading={false} maxH={composite ? 120 : 168} />
            <div style={{ alignSelf: "center", color: "var(--accent)", fontWeight: 700, fontSize: 17, flexShrink: 0 }}>=</div>
            <ColumnSelectList label={i === 0 ? "Right · " + rightName : ""} columns={rightCols} value={k.right} onChange={id => update(i, "right", id)} loading={loading} maxH={composite ? 120 : 168} />
          </div>
        </div>
      ))}
      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
        <button onClick={add} style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "5px 10px", borderRadius: "var(--radius)", border: "1px dashed var(--accent-line)", background: "transparent", color: "var(--accent)", fontSize: 11.5, fontWeight: 600, cursor: "pointer" }}>
          <Icon name="plus" size={12} /> Add key
        </button>
        <span style={{ fontSize: 10.5, color: "var(--text-4)" }}>Add a key for a composite (multi-column) join.</span>
      </div>
    </div>
  );
}

/* ──────────────────────────────────────────────────────────────────────────
   STEP RAIL — header progress (1 Source · 2 Columns)
   ────────────────────────────────────────────────────────────────────────── */
function StepRail({ step }) {
  const items = [["1", "Source"], ["2", "Keys"]];
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
      {items.map(([n, label], i) => {
        const idx = i + 1, done = step > idx, active = step === idx;
        return (
          <React.Fragment key={n}>
            <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
              <span style={{ width: 18, height: 18, borderRadius: 99, fontSize: 10, fontWeight: 700, display: "inline-flex", alignItems: "center", justifyContent: "center",
                background: active || done ? "var(--accent)" : "var(--panel-3)", color: active || done ? "var(--accent-ink)" : "var(--text-3)", transition: "background .15s" }}>
                {done ? <Icon name="check" size={10} /> : n}
              </span>
              <span style={{ fontSize: 11, fontWeight: active ? 600 : 500, color: active ? "var(--text)" : "var(--text-3)" }}>{label}</span>
            </div>
            {i === 0 && <span style={{ width: 16, height: 1, background: step > 1 ? "var(--accent-line)" : "var(--border)" }} />}
          </React.Fragment>
        );
      })}
    </div>
  );
}

/* ──────────────────────────────────────────────────────────────────────────
   THE LIVE JOIN MODAL — full two-step flow, slide transition, real chrome.
   Rendered inside a framed "stage" (position:absolute) so it lives in the doc.
   ────────────────────────────────────────────────────────────────────────── */
function JoinModalLive({ emptyState = false, transition = "slide", composite = false }) {
  const seedKeys = () => composite
    ? [{ left: "l1", right: "r2" }, { left: null, right: null }]
    : [{ left: null, right: null }];
  const [open, setOpen] = useState(true);
  const [step, setStep] = useState(1);
  const [selected, setSelected] = useState(null);
  const [xform, setXform] = useState({});
  const [keys, setKeys] = useState(seedKeys);
  const [joinType, setJoinType] = useState("inner");
  const [loadingCols, setLoadingCols] = useState(false);
  const [saved, setSaved] = useState(false);

  // Re-seed the key rows when the composite tweak flips.
  useEffect(() => { setKeys(seedKeys()); }, [composite]);

  const sources = emptyState ? [] : SOURCES;
  const selSource = sources.find(s => s.id === selected);
  const useXform = selSource ? !!xform[selSource.id] : false;
  const rightCols = useXform ? RIGHT_XFORM : RIGHT_RAW;

  function reset() {
    setStep(1); setSelected(null); setXform({}); setKeys(seedKeys()); setJoinType("inner"); setSaved(false); setOpen(true);
  }
  function goStep2() {
    setStep(2); setLoadingCols(true);
    setTimeout(() => setLoadingCols(false), 850);
  }
  const canSave = keys.length > 0 && keys.every(k => k.left && k.right);

  const step1Content = (
    <>
      <div style={{ fontSize: 12, color: "var(--text-3)", marginBottom: 12 }}>Select the report to join <span style={{ color: "var(--text-2)", fontWeight: 600 }}>Monthly Revenue</span> against.</div>
      {sources.length === 0 ? (
        <div style={{ padding: "34px 16px", textAlign: "center", border: "1px dashed var(--border)", borderRadius: "var(--radius)", color: "var(--text-4)" }}>
          <Icon name="join" size={22} style={{ color: "var(--text-4)", marginBottom: 8 }} />
          <div style={{ fontSize: 12.5, color: "var(--text-3)", lineHeight: 1.6 }}>No other reports available.<br/>Import a report on the Data screen first.</div>
        </div>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 7, maxHeight: 264, overflowY: "auto" }}>
          {sources.map(s => (
            <SourceRow key={s.id} src={s} selected={selected === s.id}
              onSelect={() => setSelected(s.id)}
              useXform={!!xform[s.id]} onToggleXform={v => setXform(p => ({ ...p, [s.id]: v }))} />
          ))}
        </div>
      )}
    </>
  );

  const step2Content = (
    <>
      <div style={{ fontSize: 12, color: "var(--text-3)", marginBottom: 14 }}>
        Joining <span className="mono" style={{ color: "var(--text-2)" }}>Monthly Revenue</span> with <span className="mono" style={{ color: "var(--accent)" }}>{selSource ? selSource.name : "—"}</span>{useXform ? " (transformed)" : ""}.
      </div>
      <KeyPairBuilder leftCols={LEFT_COLS} rightCols={rightCols} leftName="Monthly Revenue" rightName={selSource ? selSource.name : ""} keys={keys} onChange={setKeys} loading={loadingCols} />
      <div style={{ height: 16 }} />
      <JoinTypeSelect value={joinType} onChange={setJoinType} />
    </>
  );

  return (
    <div style={{ position: "relative", height: 540, borderRadius: "var(--radius-lg)", border: "1px solid var(--border)", overflow: "hidden",
      background: "var(--bg)", backgroundImage: "radial-gradient(rgba(255,255,255,0.022) 1px, transparent 0)", backgroundSize: "18px 18px" }}>

      {/* faux builder canvas behind */}
      <div style={{ position: "absolute", inset: 0, padding: 18, display: "flex", flexDirection: "column", gap: 10, opacity: open ? 0.5 : 1, transition: "opacity .2s" }}>
        <div style={{ fontSize: 11, fontWeight: 600, color: "var(--text-3)", letterSpacing: ".05em", textTransform: "uppercase" }}>Monthly Revenue · pipeline</div>
        {["Null & range checks", "Currency normaliser"].map((n, i) => (
          <div key={n} style={{ background: "var(--panel)", border: "1px solid var(--border)", borderRadius: "var(--radius-lg)", padding: "10px 12px", display: "flex", alignItems: "center", gap: 8 }}>
            <span className="mono" style={{ width: 22, height: 22, borderRadius: "var(--radius)", background: "var(--panel-3)", color: "var(--text-2)", fontSize: 11, fontWeight: 600, display: "inline-flex", alignItems: "center", justifyContent: "center" }}>{i + 1}</span>
            <span style={{ fontSize: 12.5, fontWeight: 600 }}>{n}</span>
          </div>
        ))}
        {saved && (
          <div style={{ background: "var(--accent-soft)", border: "1px solid var(--accent-line)", borderRadius: "var(--radius-lg)", padding: "10px 12px", display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ width: 22, height: 22, borderRadius: "var(--radius)", background: "var(--accent-soft)", border: "1px solid var(--accent-line)", color: "var(--accent)", display: "inline-flex", alignItems: "center", justifyContent: "center" }}><Icon name="join" size={13} /></span>
            <span style={{ fontSize: 12.5, fontWeight: 600 }}>Join · {selSource ? selSource.name : ""}</span>
            <span className="mono" style={{ marginLeft: "auto", fontSize: 9.5, fontWeight: 600, textTransform: "uppercase", padding: "1px 6px", borderRadius: 99, background: "var(--accent-soft)", color: "var(--accent)", border: "1px solid var(--accent-line)" }}>built-in</span>
          </div>
        )}
      </div>

      {/* relaunch button when closed */}
      {!open && (
        <button onClick={reset} style={{ position: "absolute", top: 14, right: 14, zIndex: 5, ...{} }}>
          <span style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "6px 12px", borderRadius: "var(--radius)", background: "var(--accent)", color: "var(--accent-ink)", fontSize: 12, fontWeight: 600, cursor: "pointer", border: "none" }}>
            <Icon name="join" size={13} /> Re-open join modal
          </span>
        </button>
      )}

      {/* overlay + dialog (absolute, scoped to stage) */}
      {open && (
        <div onClick={() => setOpen(false)} style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,.55)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 10 }}>
          <div onClick={e => e.stopPropagation()} style={{ width: 460, maxWidth: "calc(100% - 28px)", maxHeight: "calc(100% - 24px)", background: "var(--panel)", border: "1px solid var(--border)", borderRadius: "var(--radius-lg)", boxShadow: "0 16px 48px rgba(0,0,0,.6)", display: "flex", flexDirection: "column", overflow: "hidden" }}>

            {/* header */}
            <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "15px 18px", borderBottom: "1px solid var(--border)" }}>
              <Icon name="join" size={17} style={{ color: "var(--accent)" }} />
              <span style={{ fontWeight: 600, fontSize: 14.5 }}>Add join</span>
              <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 12 }}>
                <StepRail step={step} />
                <button onClick={() => setOpen(false)} title="Close" style={{ background: "none", border: "none", cursor: "pointer", color: "var(--text-4)", padding: 2, lineHeight: 0 }}><Icon name="close" size={16} /></button>
              </div>
            </div>

            {/* body — only the active step renders; transition mode from tweaks */}
            <div key={step + "-" + transition} className="join-anim"
              style={{ padding: 18, flex: "1 1 auto", minHeight: 0, overflowY: "auto",
                animation: transition === "replace" ? "none"
                  : transition === "fade" ? "joinFade .26s ease"
                  : "joinSlide .28s cubic-bezier(.4,0,.2,1)" }}>
              {step === 1 ? step1Content : step2Content}
            </div>

            {/* footer */}
            <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "13px 18px", borderTop: "1px solid var(--border)" }}>
              {step === 2 && <Btn variant="ghost" size="sm" icon="back" onClick={() => setStep(1)}>Back</Btn>}
              <span style={{ marginLeft: "auto" }} />
              <Btn variant="ghost" size="sm" onClick={() => setOpen(false)}>Cancel</Btn>
              {step === 1
                ? <Btn variant="primary" size="sm" disabled={!selected} onClick={goStep2}>Next</Btn>
                : <Btn variant="primary" size="sm" disabled={!canSave} onClick={() => { setSaved(true); setOpen(false); }}>Add step</Btn>}
            </div>

          </div>
        </div>
      )}
    </div>
  );
}

                ["SourceRow", "screen-builder.jsx", "Props: source, selected, onSelect, useTransformed, onToggleTransformed. Renders Switch only when source.steps > 0."],
                ["KeyPairBuilder", "screen-builder.jsx", "Step 2. Holds keys[] of {left,right}; add/remove/update rows. Props: leftCols, rightCols, leftName, rightName, keys, onChange, loading."],
                ["ColumnSelectList", "screen-builder.jsx", "Searchable single-select. Props: label, columns, value, onChange, loading, maxH."],
                ["JoinTypeSelect", "screen-builder.jsx", "Segmented control (inner/left/right/full). Props: value, onChange."],
                ["PaletteBuiltinCard", "screen-builder.jsx", "Built-ins tab card — accent left-edge + 'built-in' tag, no icon. Props: name, doc, builtinType, onDragStart."],
                ["Modal", "ui.jsx (new)", "Shared overlay. See Spec 6."],
                ["Switch", "ui.jsx (new)", "Shared toggle. See Spec 6."],
              ]}
            />
          </Card>
        </Section>

        {/* ── ACCEPTANCE ── */}
        <Section id="acceptance">
          <SectionHead kicker="Handoff" title="Acceptance criteria" />
          <Card>
            <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
              {[
                "Dragging the Join built-in onto the canvas opens the two-step modal (no dry-run, no inline PendingStepCard); the Built-ins card carries an accent left-edge + 'built-in' tag (no icon) distinguishing it from function/set cards.",
                "Step 1 lists all sources except the current one, each with name, row count (when available) and column count.",
                "The 'use transformed output' Switch renders only on sources with ≥1 pipeline step (absent, not greyed, otherwise) and defaults off; toggling it never changes row selection.",
                "Selecting a source highlights it and enables Next; Next advances to step 2 with the chosen transition (slide / fade / replace; hard-swap under prefers-reduced-motion).",
                "Step 2 builds join keys — each a left = right column pair (both searchable with name + type), with Add key for composite (multi-column) joins — plus an inner/left/right/full join-type selector.",
                "Back returns to step 1 with the previously selected source still highlighted and its Switch state intact.",
                "Add step is disabled until every key row is fully paired (a left and a right column selected).",
                "Saving POSTs a builtin step and stores source_builtin_map.config with right_source_id, use_transformed, join_type, on:[{left_on,right_on}], keep_columns:\"all\"; the step then appears on the canvas and the modal closes.",
                "Empty state in step 1 shows 'No other reports available. Import a report on the Data screen first.' when no other sources exist.",
                "Modal, Switch are exported from ui.jsx on window.__UI__; join + search added to ICONS. No new external dependencies; inline styles + existing tokens only.",
              ].map((t, i) => (
                <div key={i} style={{ display: "flex", gap: 10, alignItems: "flex-start", padding: "9px 0", borderBottom: i < 9 ? "1px solid var(--border-soft)" : "none" }}>
                  <span style={{ flexShrink: 0, width: 18, height: 18, borderRadius: "var(--radius)", border: "1px solid var(--accent-line)", background: "var(--accent-soft)", display: "inline-flex", alignItems: "center", justifyContent: "center", marginTop: 1, color: "var(--accent)" }}><Icon name="check" size={11} /></span>
                  <span style={{ fontSize: 13, color: "var(--text-2)", lineHeight: 1.6 }}>{t}</span>
                </div>
              ))}
            </div>
          </Card>
        </Section>

      </div>

      <footer style={{ marginTop: 64, paddingTop: 24, borderTop: "1px solid var(--border)", display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
        <span className="mono" style={{ fontSize: 11, color: "var(--text-4)" }}>pipeui · design brief · issue #152 · feat/join-source-picker-modal</span>
        <span style={{ marginLeft: "auto", fontSize: 11, color: "var(--text-4)" }}>Rendered live with production tokens · inline styles only</span>
      </footer>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Brand" />
        <TweakColor label="Accent" value={t.accent}
          options={[
            ["#7c6cf5", "rgba(124,108,245,0.12)", "rgba(124,108,245,0.40)"],
            ["#1fb8a6", "rgba(31,184,166,0.12)", "rgba(31,184,166,0.40)"],
            ["#e0913a", "rgba(224,145,58,0.12)", "rgba(224,145,58,0.40)"],
            ["#e0607f", "rgba(224,96,127,0.13)", "rgba(224,96,127,0.42)"],
          ]}
          onChange={v => setTweak("accent", v)} />
        <TweakSection label="Modal motion" />
        <TweakRadio label="Step transition" value={t.transition}
          options={[{ value: "slide", label: "Slide" }, { value: "fade", label: "Crossfade" }, { value: "replace", label: "Replace" }]}
          onChange={v => setTweak("transition", v)} />
        <TweakSection label="Join keys" />
        <TweakRadio label="Preview" value={t.joinKeys}
          options={[{ value: "single", label: "One key" }, { value: "composite", label: "Composite" }]}
          onChange={v => setTweak("joinKeys", v)} />
      </TweaksPanel>
    </div>
  );
}

/* live demo wrappers used in Spec 3 / 4 / 6 */
function Step1RowDemo() {
  const [sel, setSel] = useState("src-sf");
  const [xf, setXf] = useState({});
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 7 }}>
      {SOURCES.slice(0, 3).map(s => (
        <SourceRow key={s.id} src={s} selected={sel === s.id} onSelect={() => setSel(s.id)}
          useXform={!!xf[s.id]} onToggleXform={v => setXf(p => ({ ...p, [s.id]: v }))} />
      ))}
    </div>
  );
}
function Step2Demo() {
  const [keys, setKeys] = useState([{ left: "l1", right: "r2" }, { left: "l4", right: null }]);
  const [joinType, setJoinType] = useState("inner");
  const [loading, setLoading] = useState(true);
  useEffect(() => { const t = setTimeout(() => setLoading(false), 1100); return () => clearTimeout(t); }, []);
  return (
    <div>
      <KeyPairBuilder leftCols={LEFT_COLS} rightCols={RIGHT_RAW} leftName="Monthly Revenue" rightName="Salesforce Opps" keys={keys} onChange={setKeys} loading={loading} />
      <div style={{ height: 16 }} />
      <div style={{ maxWidth: 360 }}><JoinTypeSelect value={joinType} onChange={setJoinType} /></div>
    </div>
  );
}
function SwitchStates() {
  const [a, setA] = useState(true);
  const [b, setB] = useState(false);
  const cell = (label, node) => (
    <div style={{ display: "flex", flexDirection: "column", gap: 10, alignItems: "center" }}>
      {node}
      <span className="mono" style={{ fontSize: 10.5, color: "var(--text-4)" }}>{label}</span>
    </div>
  );
  return (
    <div style={{ display: "flex", flexWrap: "wrap", gap: 30, alignItems: "flex-start" }}>
      {cell("off", <Switch checked={false} onChange={() => {}} />)}
      {cell("on", <Switch checked={true} onChange={() => {}} />)}
      {cell("disabled", <Switch checked={false} disabled onChange={() => {}} />)}
      {cell("disabled · on", <Switch checked={true} disabled onChange={() => {}} />)}
      <div style={{ width: 1, alignSelf: "stretch", background: "var(--border)" }} />
      {cell("live — click", <div style={{ display: "flex", gap: 12 }}><Switch checked={a} onChange={setA} /><Switch checked={b} onChange={setB} /></div>)}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
