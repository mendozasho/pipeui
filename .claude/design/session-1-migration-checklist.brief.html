<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PipeUI — Session 1 Migration Checklist</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0e10; --panel: #141416; --panel-2: #1a1a1d; --panel-3: #202024;
    --border: rgba(255,255,255,0.08); --border-soft: rgba(255,255,255,0.04); --hover: rgba(255,255,255,0.06);
    --text: #f0f0f2; --text-2: #a0a0aa; --text-3: #6a6a74; --text-4: #3a3a42;
    --good: #34d399; --bad: #f87171; --warn: #fbbf24; --run: #60a5fa;
    --accent: #7c6cf5; --accent-soft: rgba(124,108,245,0.12); --accent-line: rgba(124,108,245,0.4); --accent-ink: #fff;
    --radius: 6px; --radius-lg: 10px;
    font-family: 'Geist', system-ui, sans-serif; font-size: 14px;
  }
  body { background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; line-height: 1.5; }
  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.16); }
  .mono { font-family: 'Geist Mono', ui-monospace, monospace; }
  body::before { content: ""; position: fixed; inset: 0 0 auto 0; height: 2px; z-index: 50; background: linear-gradient(90deg, transparent, var(--accent), transparent); opacity: .5; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

/* ──────────────────────────────────────────────────────────────────────────
   DATA — every call site, lifted from the actual screen files @ main.
   type: "loading" (→ LoadingState) | "spinner" (→ Spinner in Btn) | "error" (→ InlineError)
   bug: short label when this item also fixes a defect.
   ────────────────────────────────────────────────────────────────────────── */
const PRES = {
  loading: { tag: "LoadingState", color: "var(--accent)" },
  spinner: { tag: "Spinner",      color: "var(--run)" },
  error:   { tag: "InlineError",  color: "var(--bad)" },
};

const FILES = [
  {
    file: "screen-data.jsx",
    destructure: "Add Spinner, LoadingState, InlineError to the window.__UI__ destructure (alongside DataTable, SourceBadge, StatusPill, Icon).",
    items: [
      { id: "d1", type: "error", loc: "L303–306, L325–328", bug: "Silent failure",
        title: "Column-type migration swallows errors",
        note: "Both catch blocks log to console only — the user sees nothing when a migration fails. Add a migrationError state, surface it in the column drawer, and keep the console.error as a dev log.",
        del: ['} catch (err) {', '  console.error("Column type migration error:", err);', '  setSelected(prev);', '}'],
        add: ['} catch (err) {', '  console.error("Column type migration error:", err);   // keep dev log', '  setSelected(prev);', '  setMigrationError("Couldn\u2019t apply the type change \u2014 the source is unchanged.");', '}', '', '// in the column drawer body:', '<InlineError variant="panel" onDismiss={() => setMigrationError(null)}>', '  {migrationError}', '</InlineError>'] },
      { id: "d2", type: "loading", loc: "L541",
        title: "Source preview placeholder",
        del: ['<div style={{ color: "var(--text-3)", fontSize: 12, padding: "8px 0" }}>Loading\u2026</div>'],
        add: ['<LoadingState label="Loading preview\u2026" />'] },
      { id: "d3", type: "loading", loc: "L620–628",
        title: "Sources table has no loading state",
        note: "DataTable renders its \u201CNo data yet\u201D empty row even while fetching. Gate it.",
        del: ['<DataTable columns={columns} rows={sources} \u2026 />'],
        add: ['{loading', '  ? <LoadingState label="Loading sources\u2026" />', '  : <DataTable columns={columns} rows={sources} \u2026 />}'] },
      { id: "d4", type: "spinner", loc: "L469–472",
        title: "Ingest-file button",
        del: ['<Btn variant="ghost" \u2026 disabled={ingesting}>', '  {ingesting ? "Ingesting\u2026" : "Ingest file"}', '</Btn>'],
        add: ['<Btn variant="ghost" \u2026 disabled={ingesting}>', '  {ingesting ? <><Spinner size={13} /> Ingesting\u2026</> : "Ingest file"}', '</Btn>'] },
      { id: "d5", type: "spinner", loc: "L771–783",
        title: "Per-row Run button (raw <button>)",
        note: "It\u2019s a bare <button> with no flex \u2014 add display:inline-flex + gap so the spinner sits beside the label.",
        del: ['<button \u2026 disabled={isRunning} style={{ \u2026 whiteSpace: "nowrap" }}>', '  {isRunning ? "Running\u2026" : "Run"}', '</button>'],
        add: ['<button \u2026 disabled={isRunning} style={{ \u2026 display: "inline-flex",', '  alignItems: "center", gap: 6, whiteSpace: "nowrap" }}>', '  {isRunning ? <><Spinner size={12} color="var(--text-3)" /> Running\u2026</> : "Run"}', '</button>'] },
    ],
  },
  {
    file: "screen-modules.jsx",
    destructure: "Add Spinner, LoadingState, InlineError to the window.__UI__ destructure.",
    items: [
      { id: "m1", type: "error", loc: "L244", bug: "Wrong pattern",
        title: "\u201CSet name is required\u201D fires a toast",
        note: "Field validation belongs at the field, not in a transient toast that floats away from the input. Add a nameError state, clear it on change.",
        del: ['if (!setName.trim()) { flash && flash("Set name is required.", "error"); return; }'],
        add: ['if (!setName.trim()) { setNameError("Set name is required."); return; }', '', '// under the name <input>:', '<InlineError>{nameError}</InlineError>'] },
      { id: "m2", type: "loading", loc: "L783–785",
        title: "Functions list placeholder",
        del: ['{loading && (', '  <div style={{ color: "var(--text-3)", fontSize: 13 }}>Loading functions\u2026</div>', ')}'],
        add: ['{loading && <LoadingState label="Loading functions\u2026" />}'] },
      { id: "m3", type: "loading", loc: "L509–510",
        title: "Sets list shows nothing while loading",
        note: "Only the empty + loaded states render today; add the loading branch.",
        del: ['{!setsLoading && sets.length === 0 && ( \u2026 )}'],
        add: ['{setsLoading && <LoadingState label="Loading sets\u2026" />}', '{!setsLoading && sets.length === 0 && ( \u2026 )}'] },
      { id: "m4", type: "spinner", loc: "L612–614, L283–285",
        title: "Run buttons (functions & sets tabs)",
        note: "Both run handlers track runningFns[id] / runningSets[id]. Swap the \u201CRunning\u2026\u201D text for Spinner + label in each run button.",
        del: ['{running ? "Running\u2026" : "Run"}'],
        add: ['{running ? <><Spinner size={12} /> Running\u2026</> : "Run"}'] },
      { id: "m5", type: "spinner", loc: "L503, L709", optional: true,
        title: "Header counts (optional)",
        note: "The \u201CLoading\u2026\u201D count text in the Sets/Functions headers is fine as-is; if you want motion, drop a <Spinner size={12} /> beside it. Low priority.",
        del: ['{loading ? "Loading\u2026" : `${functions.length} functions registered`}'],
        add: ['{loading ? <><Spinner size={12} /> Loading\u2026</> : `${functions.length} functions registered`}'] },
    ],
  },
  {
    file: "screen-builder.jsx",
    destructure: "Add Spinner, LoadingState, InlineError to the window.__UI__ destructure.",
    items: [
      { id: "b1", type: "error", loc: "L876–878", bug: "Off-palette",
        title: "Pipeline-load error uses a hardcoded hex",
        note: "#e05252 isn\u2019t a token \u2014 it drifts from --bad. The component fixes the colour and the pattern at once.",
        del: ['{error && (', '  <div style={{ color: "#e05252", fontSize: 13 }}>{error}</div>', ')}'],
        add: ['{error && <InlineError variant="panel">{error}</InlineError>}'] },
      { id: "b2", type: "loading", loc: "L682",
        title: "Functions/Sets palette list",
        del: ['{loading && <div style={{ fontSize: 11, color: "var(--text-4)", textAlign: "center", paddingTop: 20 }}>Loading...</div>}'],
        add: ['{loading && <LoadingState label="Loading\u2026" />}'] },
      { id: "b3", type: "loading", loc: "L873–875",
        title: "Pipeline canvas placeholder",
        del: ['{loading && (', '  <div style={{ color: "var(--text-4)", fontSize: 13, textAlign: "center", paddingTop: 30 }}>Loading...</div>', ')}'],
        add: ['{loading && <LoadingState />}'] },
      { id: "b4", type: "loading", loc: "L870–872",
        title: "Dry-run parameter fetch",
        del: ['{pendingDryRunning && (', '  <div style={{ \u2026 }}>Loading parameters...</div>', ')}'],
        add: ['{pendingDryRunning && <LoadingState label="Loading parameters\u2026" />}'] },
    ],
  },
  {
    file: "screen-results.jsx",
    destructure: "Add LoadingState, InlineError to the window.__UI__ destructure.",
    items: [
      { id: "r1", type: "loading", loc: "L315–317",
        title: "Transform staging fetch",
        del: ['if (loading) {', '  return <div style={{ color: "var(--text-4)", fontSize: 13 }}>Loading staging data\u2026</div>;', '}'],
        add: ['if (loading) return <LoadingState label="Loading staging data\u2026" />;'] },
      { id: "r2", type: "error", loc: "L318–320",
        title: "Staging-load error",
        note: "Already on --bad \u2014 swap to the component for consistency.",
        del: ['if (error) {', '  return <div style={{ color: "var(--bad)", fontSize: 13 }}>{error}</div>;', '}'],
        add: ['if (error) return <InlineError variant="panel">{error}</InlineError>;'] },
    ],
  },
  {
    file: "screen-settings.jsx",
    destructure: "Add Spinner, LoadingState, InlineError to the window.__UI__ destructure.",
    items: [
      { id: "s1", type: "error", loc: "L207, L210", bug: "Renders as success",
        title: 'flash kind "err" is not "error"',
        note: 'Flash only special-cases kind === "error". "err" falls through to the green success style \u2014 a failed save looks like it worked. Fix the kind string at both sites.',
        del: ['flash("Failed to save settings", "err");'],
        add: ['flash("Failed to save settings", "error");'] },
      { id: "s2", type: "loading", loc: "L92–94",
        title: "Directory browser placeholder",
        del: ['{loading && (', '  <div style={{ padding: "20px 16px", color: "var(--text-3)", fontSize: 13 }}>Loading\u2026</div>', ')}'],
        add: ['{loading && <LoadingState label="Loading\u2026" />}'] },
      { id: "s3", type: "error", loc: "L95–97",
        title: "Directory browse error",
        note: "Also note: the div uses var(--danger, #e55) \u2014 a token that doesn\u2019t exist. InlineError fixes that too.",
        del: ['{error && (', '  <div style={{ padding: "20px 16px", color: "var(--danger, #e55)", fontSize: 13 }}>{error}</div>', ')}'],
        add: ['{error && <InlineError variant="panel">{error}</InlineError>}'] },
      { id: "s4", type: "loading", loc: "L216–220",
        title: "Initial config load (full screen)",
        del: ['if (!loaded) return (', '  <div style={{ flex: 1, display: "flex", \u2026 }}>Loading\u2026</div>', ');'],
        add: ['if (!loaded) return <LoadingState label="Loading settings\u2026" />;'] },
      { id: "s5", type: "spinner", loc: "L358–360",
        title: "Save button",
        del: ['<Btn variant="primary" onClick={handleSave} disabled={saving}>', '  {saving ? "Saving\u2026" : "Save"}', '</Btn>'],
        add: ['<Btn variant="primary" onClick={handleSave} disabled={saving}>', '  {saving ? <><Spinner size={13} color="var(--accent-ink)" /> Saving\u2026</> : "Save"}', '</Btn>'] },
    ],
  },
];

const ALL_IDS = FILES.flatMap(f => f.items.map(i => i.id));
const BUGS = FILES.flatMap(f => f.items.filter(i => i.bug).map(i => ({ ...i, file: f.file })));
const LS_KEY = "pipeui_migration_checks_v1";

/* ── persistence ── */
function useChecks() {
  const [checks, setChecks] = useState(() => {
    try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch { return {}; }
  });
  useEffect(() => { try { localStorage.setItem(LS_KEY, JSON.stringify(checks)); } catch {} }, [checks]);
  const toggle = id => setChecks(c => ({ ...c, [id]: !c[id] }));
  const reset = () => setChecks({});
  return [checks, toggle, reset];
}

/* ── primitives ── */
function Eyebrow({ children, color = "var(--accent)" }) {
  return <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: ".14em", textTransform: "uppercase", color }}>{children}</div>;
}
function TypeTag({ type, optional }) {
  const p = PRES[type];
  return (
    <span className="mono" style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "2px 9px", borderRadius: 99, background: "var(--panel-3)", border: "1px solid var(--border)", fontSize: 10.5, color: "var(--text-2)" }}>
      <span style={{ width: 7, height: 7, borderRadius: 99, background: p.color }} />{p.tag}{optional ? " · opt" : ""}
    </span>
  );
}
function Diff({ del, add }) {
  return (
    <div style={{ border: "1px solid var(--border)", borderRadius: "var(--radius)", overflow: "hidden", background: "#0a0a0c" }}>
      {del.map((ln, i) => (
        <div key={"d" + i} className="mono" style={{ display: "flex", fontSize: 12, lineHeight: 1.6, background: "rgba(248,113,113,.06)" }}>
          <span style={{ width: 22, textAlign: "center", color: "var(--bad)", flexShrink: 0, userSelect: "none", opacity: .8 }}>–</span>
          <span style={{ color: "var(--text-3)", whiteSpace: "pre-wrap", paddingRight: 12 }}>{ln}</span>
        </div>
      ))}
      {add.map((ln, i) => (
        <div key={"a" + i} className="mono" style={{ display: "flex", fontSize: 12, lineHeight: 1.6, background: "rgba(52,211,153,.06)" }}>
          <span style={{ width: 22, textAlign: "center", color: "var(--good)", flexShrink: 0, userSelect: "none", opacity: .8 }}>+</span>
          <span style={{ color: ln.trimStart().startsWith("//") ? "var(--text-4)" : "var(--text-2)", whiteSpace: "pre-wrap", paddingRight: 12 }}>{ln}</span>
        </div>
      ))}
    </div>
  );
}

function Item({ item, checked, onToggle }) {
  return (
    <div style={{ display: "flex", gap: 13, padding: "16px 0", borderTop: "1px solid var(--border-soft)" }}>
      <button onClick={onToggle} aria-label="toggle" style={{
        flexShrink: 0, width: 19, height: 19, marginTop: 1, borderRadius: 5, cursor: "pointer",
        border: checked ? "1px solid var(--accent)" : "1px solid var(--border)",
        background: checked ? "var(--accent)" : "transparent",
        display: "flex", alignItems: "center", justifyContent: "center", transition: "all .12s",
      }}>
        {checked && <svg width="12" height="12" viewBox="0 0 20 20" fill="none" stroke="var(--accent-ink)" strokeWidth="2.5"><path d="m4 10 4.5 4.5L16 6" /></svg>}
      </button>

      <div style={{ flex: 1, minWidth: 0, opacity: checked ? 0.5 : 1, transition: "opacity .12s" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 9, flexWrap: "wrap", marginBottom: item.note ? 7 : 11 }}>
          <span style={{ fontSize: 14, fontWeight: 500, color: "var(--text)", textDecoration: checked ? "line-through" : "none", textDecorationColor: "var(--text-4)" }}>{item.title}</span>
          {item.bug && (
            <span style={{ display: "inline-flex", alignItems: "center", gap: 4, fontSize: 10, fontWeight: 600, letterSpacing: ".04em", textTransform: "uppercase", color: "var(--bad)", background: "rgba(248,113,113,.1)", border: "1px solid rgba(248,113,113,.3)", borderRadius: 99, padding: "2px 8px" }}>
              <svg width="10" height="10" viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M10 3 2 17h16L10 3z" /><path d="M10 8v4M10 14v.5" /></svg>
              {item.bug}
            </span>
          )}
          <span style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 8 }}>
            <span className="mono" style={{ fontSize: 11, color: "var(--text-4)" }}>{item.loc}</span>
            <TypeTag type={item.type} optional={item.optional} />
          </span>
        </div>
        {item.note && <p style={{ fontSize: 12.5, color: "var(--text-3)", lineHeight: 1.55, marginBottom: 11, maxWidth: 760 }}>{item.note}</p>}
        <Diff del={item.del} add={item.add} />
      </div>
    </div>
  );
}

function FileCard({ f, checks, toggle }) {
  const done = f.items.filter(i => checks[i.id]).length;
  return (
    <section style={{ background: "var(--panel)", border: "1px solid var(--border)", borderRadius: "var(--radius-lg)", overflow: "hidden" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "15px 20px", borderBottom: "1px solid var(--border)", background: "var(--panel-2)" }}>
        <svg width="15" height="15" viewBox="0 0 20 20" fill="none" stroke="var(--text-3)" strokeWidth="1.5"><path d="M5 3h7l4 4v10a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z" /><path d="M12 3v4h4" /></svg>
        <span className="mono" style={{ fontSize: 14, fontWeight: 500, color: "var(--text)" }}>{f.file}</span>
        <span className="mono" style={{ marginLeft: "auto", fontSize: 11.5, color: done === f.items.length ? "var(--good)" : "var(--text-3)" }}>{done}/{f.items.length}</span>
      </div>
      <div style={{ padding: "4px 20px 16px" }}>
        <div style={{ display: "flex", gap: 9, padding: "13px 0 3px", color: "var(--text-3)", fontSize: 12.5, lineHeight: 1.55 }}>
          <svg width="15" height="15" viewBox="0 0 20 20" fill="none" stroke="var(--accent)" strokeWidth="1.5" style={{ flexShrink: 0, marginTop: 1 }}><circle cx="10" cy="10" r="7.5" /><path d="M10 7v6M10 5.5v.01" /></svg>
          <span><span style={{ color: "var(--text-2)", fontWeight: 500 }}>Prereq · </span>{f.destructure}</span>
        </div>
        {f.items.map(item => <Item key={item.id} item={item} checked={!!checks[item.id]} onToggle={() => toggle(item.id)} />)}
      </div>
    </section>
  );
}

/* ── markdown export ── */
function buildMarkdown(checks) {
  let md = "# PipeUI · Session 1 — primitive rollout\n\n";
  md += "Roll `Spinner`, `LoadingState` and `InlineError` (from the Session 1 spec) into the five screens. ";
  md += "Replaces every ad-hoc `\"Loading…\"` div and standardises error surfacing. Fixes 4 defects en route.\n\n";
  md += "**Prereq:** `ui.jsx` exports the three new primitives on `window.__UI__`.\n\n";
  md += "## Bugs fixed\n";
  BUGS.forEach(b => { md += `- **${b.bug}** — ${b.file} ${b.loc}: ${b.title}\n`; });
  md += "\n";
  FILES.forEach(f => {
    md += `## ${f.file}\n_Prereq: ${f.destructure}_\n\n`;
    f.items.forEach(i => {
      const box = checks[i.id] ? "x" : " ";
      md += `- [${box}] **${i.title}** (${i.loc}) · ${PRES[i.type].tag}${i.optional ? " · optional" : ""}${i.bug ? ` · ⚠ ${i.bug}` : ""}\n`;
      if (i.note) md += `  - ${i.note}\n`;
      md += "  ```diff\n";
      i.del.forEach(l => { md += `  - ${l}\n`; });
      i.add.forEach(l => { md += `  + ${l}\n`; });
      md += "  ```\n";
    });
    md += "\n";
  });
  return md;
}

function App() {
  const [checks, toggle, reset] = useChecks();
  const [copied, setCopied] = useState(false);
  const done = ALL_IDS.filter(id => checks[id]).length;
  const total = ALL_IDS.length;
  const pct = Math.round((done / total) * 100);

  const copyMd = () => {
    const md = buildMarkdown(checks);
    navigator.clipboard.writeText(md).then(() => { setCopied(true); setTimeout(() => setCopied(false), 1800); })
      .catch(() => { setCopied(false); });
  };

  return (
    <div style={{ maxWidth: 920, margin: "0 auto", padding: "52px 28px 120px" }}>

      {/* masthead */}
      <header style={{ display: "flex", flexDirection: "column", gap: 16, marginBottom: 30 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="3" width="8" height="8" rx="2" fill="var(--accent)" />
            <rect x="13" y="3" width="8" height="8" rx="2" fill="var(--accent)" opacity=".5" />
            <rect x="3" y="13" width="8" height="8" rx="2" fill="var(--accent)" opacity=".5" />
            <rect x="13" y="13" width="8" height="8" rx="2" fill="var(--accent)" />
          </svg>
          <span style={{ fontSize: 14, fontWeight: 600 }}>pipeui</span>
          <span style={{ width: 1, height: 14, background: "var(--border)" }} />
          <span className="mono" style={{ fontSize: 12, color: "var(--text-3)" }}>frontend/ · 5 screens</span>
        </div>
        <Eyebrow>Migration · Session 1</Eyebrow>
        <h1 style={{ fontSize: 31, fontWeight: 600, letterSpacing: "-.02em", lineHeight: 1.12 }}>Roll the new primitives into the screens</h1>
        <p style={{ fontSize: 14.5, color: "var(--text-2)", maxWidth: 680, lineHeight: 1.6 }}>
          Every <span className="mono" style={{ color: "var(--text)" }}>"Loading…"</span> div and stray error path across the five screens, mapped to its replacement. Tick as you go — state persists. <strong style={{ color: "var(--text)", fontWeight: 600 }}>Copy as Markdown</strong> turns this into the Claude Code issue verbatim.
        </p>
      </header>

      {/* control bar */}
      <div style={{ position: "sticky", top: 0, zIndex: 20, background: "rgba(14,14,16,.86)", backdropFilter: "blur(10px)", borderBottom: "1px solid var(--border)", margin: "0 -28px 30px", padding: "14px 28px", display: "flex", alignItems: "center", gap: 18 }}>
        <div style={{ display: "flex", flexDirection: "column", gap: 6, flex: 1, minWidth: 0 }}>
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11.5 }}>
            <span className="mono" style={{ color: "var(--text-3)" }}>{done} / {total} done</span>
            <span className="mono" style={{ color: pct === 100 ? "var(--good)" : "var(--text-3)" }}>{pct}%</span>
          </div>
          <div style={{ height: 5, borderRadius: 99, background: "var(--panel-3)", overflow: "hidden" }}>
            <div style={{ height: "100%", width: pct + "%", background: pct === 100 ? "var(--good)" : "var(--accent)", borderRadius: 99, transition: "width .25s, background .25s" }} />
          </div>
        </div>
        <button onClick={reset} style={{ background: "transparent", border: "1px solid var(--border)", color: "var(--text-3)", borderRadius: "var(--radius)", padding: "7px 13px", fontSize: 12.5, cursor: "pointer", whiteSpace: "nowrap" }}>Reset</button>
        <button onClick={copyMd} style={{ display: "inline-flex", alignItems: "center", gap: 7, background: copied ? "var(--good)" : "var(--accent)", border: "1px solid transparent", color: copied ? "#06281c" : "var(--accent-ink)", borderRadius: "var(--radius)", padding: "7px 15px", fontSize: 12.5, fontWeight: 500, cursor: "pointer", whiteSpace: "nowrap", transition: "background .15s" }}>
          {copied
            ? <><svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="m4 10 4.5 4.5L16 6" /></svg> Copied</>
            : <><svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="7" y="7" width="9" height="9" rx="1.5" /><path d="M4 13V4a1 1 0 0 1 1-1h9" /></svg> Copy as Markdown</>}
        </button>
      </div>

      {/* bugs callout */}
      <div style={{ background: "var(--panel)", border: "1px solid rgba(248,113,113,.28)", borderRadius: "var(--radius-lg)", padding: 20, marginBottom: 18 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 9, marginBottom: 14 }}>
          <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="var(--bad)" strokeWidth="1.6"><path d="M10 3 2 17h16L10 3z" /><path d="M10 8v4M10 14v.5" /></svg>
          <span style={{ fontSize: 13, fontWeight: 600, color: "var(--text)" }}>Four defects this migration fixes along the way</span>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          {BUGS.map(b => (
            <div key={b.id} style={{ display: "flex", gap: 10, padding: "11px 13px", background: "var(--panel-2)", border: "1px solid var(--border)", borderRadius: "var(--radius)" }}>
              <span style={{ fontSize: 10, fontWeight: 700, letterSpacing: ".04em", textTransform: "uppercase", color: "var(--bad)", whiteSpace: "nowrap", marginTop: 1 }}>{b.bug}</span>
              <div style={{ minWidth: 0 }}>
                <div style={{ fontSize: 12.5, color: "var(--text-2)", lineHeight: 1.45 }}>{b.title}</div>
                <div className="mono" style={{ fontSize: 10.5, color: "var(--text-4)", marginTop: 3 }}>{b.file} · {b.loc}</div>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* legend */}
      <div style={{ display: "flex", flexWrap: "wrap", gap: 16, padding: "0 2px", marginBottom: 26, fontSize: 12, color: "var(--text-3)" }}>
        {Object.entries(PRES).map(([k, p]) => (
          <span key={k} style={{ display: "inline-flex", alignItems: "center", gap: 7 }}>
            <span style={{ width: 8, height: 8, borderRadius: 99, background: p.color }} />
            <span className="mono" style={{ color: "var(--text-2)" }}>{p.tag}</span>
            <span>{k === "loading" ? "list/section placeholders" : k === "spinner" ? "in-button progress" : "field & panel errors"}</span>
          </span>
        ))}
      </div>

      {/* file cards */}
      <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>
        {FILES.map(f => <FileCard key={f.file} f={f} checks={checks} toggle={toggle} />)}
      </div>

      {/* footer */}
      <div style={{ marginTop: 30, padding: "16px 18px", borderRadius: "var(--radius)", background: "var(--accent-soft)", border: "1px solid var(--accent-line)", fontSize: 12.5, color: "var(--text-2)", lineHeight: 1.6 }}>
        <strong style={{ color: "var(--text)", fontWeight: 600 }}>Out of scope for this issue:</strong> the Flash-vs-InlineError kinds remain inconsistent across the codebase (<span className="mono" style={{ color: "var(--text)" }}>"ok"</span>, <span className="mono" style={{ color: "var(--text)" }}>"success"</span>, <span className="mono" style={{ color: "var(--text)" }}>"err"</span>, <span className="mono" style={{ color: "var(--text)" }}>"error"</span>). Item <span className="mono" style={{ color: "var(--text)" }}>s1</span> fixes the one that renders wrong; a follow-up should standardise Flash to <span className="mono" style={{ color: "var(--text)" }}>"ok" | "error"</span> only.
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
