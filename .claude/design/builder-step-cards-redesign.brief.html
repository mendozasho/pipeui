<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PipeUI — Builder Step Cards Redesign · Design Brief</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e10; --panel: #141416; --panel-2: #1a1a1d; --panel-3: #202024;
    --border: rgba(255,255,255,0.08); --border-soft: rgba(255,255,255,0.04); --hover: rgba(255,255,255,0.06);
    --text: #f0f0f2; --text-2: #a0a0aa; --text-3: #6a6a74; --text-4: #3a3a42;
    --good: #34d399; --bad: #f87171; --warn: #fbbf24; --run: #60a5fa;
    --accent: #7c6cf5; --accent-soft: rgba(124,108,245,0.12); --accent-line: rgba(124,108,245,0.4); --accent-ink: #fff;
    --check: #60a5fa; --check-bg: rgba(96,165,250,0.1); --xform: #fbbf24; --xform-bg: rgba(251,191,36,0.1);
    --radius: 6px; --radius-lg: 10px;
    font-family: 'Geist', system-ui, sans-serif;
    font-size: 14px;
  }

  body { background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; line-height: 1.5; }

  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.16); }

  .mono { font-family: 'Geist Mono', ui-monospace, monospace; }

  body::before {
    content: ""; position: fixed; inset: 0 0 auto 0; height: 2px; z-index: 50;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: .5;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
const { useState, useRef } = React;

/* ──────────────────────────────────────────────────────────────────────────
   PRIMITIVES — lifted verbatim from ui.jsx so the before/after renders the
   REAL components. drag/check/close/warn/chevron/trash all exist in ICONS.
   ────────────────────────────────────────────────────────────────────────── */
const ICONS = {
  close:    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="m5 5 10 10M15 5 5 15"/></svg>,
  check:    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="2"><path d="m4 10 4.5 4.5L16 6"/></svg>,
  warn:     <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M10 3 2 17h16L10 3z"/><path d="M10 8v4M10 14v.5"/></svg>,
  drag:     <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="7.5" cy="6" r="1"/><circle cx="12.5" cy="6" r="1"/><circle cx="7.5" cy="10" r="1"/><circle cx="12.5" cy="10" r="1"/><circle cx="7.5" cy="14" r="1"/><circle cx="12.5" cy="14" r="1"/></svg>,
};
function Icon({ name, size = 16, style }) {
  const svg = ICONS[name]; if (!svg) return null;
  return <span style={{ display: "inline-flex", alignItems: "center", width: size, height: size, flexShrink: 0, ...style }}>{React.cloneElement(svg, { width: size, height: size })}</span>;
}

/* ── KindTag / type badge as used on the StepCard (TYPE_BADGE_COLORS) ── */
const TYPE_BADGE_COLORS = {
  Validation: { bg: "#e8f4fd", color: "#2980b9" },
  Transform:  { bg: "#eafaf1", color: "#27ae60" },
  Mixed:      { bg: "#fef9e7", color: "#d68910" },
};
function TypeBadge({ type }) {
  const s = TYPE_BADGE_COLORS[type] || { bg: "var(--panel-3)", color: "var(--text-3)" };
  return <span style={{ fontSize: 10, fontWeight: 600, padding: "2px 8px", borderRadius: 99, flexShrink: 0, background: s.bg, color: s.color }}>{type}</span>;
}

/* ──────────────────────────────────────────────────────────────────────────
   THE TWO PROPOSED PRIMITIVES — rendered live, exactly as specced for ui.jsx
   ────────────────────────────────────────────────────────────────────────── */

/* OrderBadge — doubles as the drag handle. Number is the 1-based visual order. */
function OrderBadge({ n, dragging }) {
  const [hover, setHover] = useState(false);
  const bg = dragging ? "var(--accent-soft)" : hover ? "var(--hover)" : "var(--panel-3)";
  const border = dragging || hover ? "var(--accent-line)" : "var(--border)";
  const ink = dragging ? "var(--accent)" : "var(--text-2)";
  return (
    <span
      title="Drag to reorder"
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        width: 26, height: 26, flexShrink: 0, cursor: "grab",
        display: "inline-flex", alignItems: "center", justifyContent: "center",
        borderRadius: "var(--radius)", background: bg, border: "1px solid " + border,
        color: ink, transition: "background .12s, border-color .12s, color .12s",
      }}
    >
      {hover && !dragging
        ? <Icon name="drag" size={16} style={{ color: "var(--text-3)" }} />
        : <span className="mono" style={{ fontSize: 12, fontWeight: 600, lineHeight: 1 }}>{n}</span>}
    </span>
  );
}

/* Checkbox — the ui.jsx primitive that replaces raw <input type="checkbox">. */
function Checkbox({ checked, onChange, disabled }) {
  const [hover, setHover] = useState(false);
  return (
    <span
      role="checkbox"
      aria-checked={checked}
      onClick={() => !disabled && onChange && onChange(!checked)}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        width: 17, height: 17, flexShrink: 0,
        display: "inline-flex", alignItems: "center", justifyContent: "center",
        borderRadius: "var(--radius)",
        background: checked ? "var(--accent)" : "var(--panel-2)",
        border: "1px solid " + (checked ? "transparent" : hover && !disabled ? "var(--accent-line)" : "var(--border)"),
        color: "var(--accent-ink)",
        cursor: disabled ? "not-allowed" : "pointer", opacity: disabled ? 0.45 : 1,
        transition: "background .12s, border-color .12s",
      }}
    >
      {checked && <Icon name="check" size={12} />}
    </span>
  );
}

/* ──────────────────────────────────────────────────────────────────────────
   DOC CHROME — same kit as the Function-Drawer brief
   ────────────────────────────────────────────────────────────────────────── */
function Eyebrow({ children, color = "var(--accent)" }) {
  return <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: ".14em", textTransform: "uppercase", color }}>{children}</div>;
}
function SubHead({ children }) {
  return <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: ".08em", textTransform: "uppercase", color: "var(--text-3)", marginBottom: 12 }}>{children}</div>;
}
function Card({ children, style }) {
  return <div style={{ background: "var(--panel)", border: "1px solid var(--border)", borderRadius: "var(--radius-lg)", padding: 24, display: "flex", flexDirection: "column", gap: 20, ...style }}>{children}</div>;
}
function Block({ children, style }) {
  return <div style={{ display: "flex", flexDirection: "column", gap: 12, ...style }}>{children}</div>;
}
function Section({ id, children }) {
  return <section id={id} style={{ display: "flex", flexDirection: "column", gap: 20, scrollMarginTop: 24 }}>{children}</section>;
}
function SectionHead({ kicker, title, children }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
      <Eyebrow>{kicker}</Eyebrow>
      <h2 style={{ fontSize: 23, fontWeight: 600, letterSpacing: "-.01em" }}>{title}</h2>
      {children && <p style={{ fontSize: 14, color: "var(--text-2)", maxWidth: 740, lineHeight: 1.6 }}>{children}</p>}
    </div>
  );
}
function M({ children }) { return <span className="mono" style={{ color: "var(--text)" }}>{children}</span>; }

function Diff({ rows, file = "screen-builder.jsx" }) {
  return (
    <div style={{ border: "1px solid var(--border)", borderRadius: "var(--radius)", overflow: "hidden", background: "#0a0a0c" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 7, padding: "7px 12px", borderBottom: "1px solid var(--border-soft)", background: "var(--panel-2)" }}>
        <span style={{ width: 8, height: 8, borderRadius: 99, background: "var(--text-4)" }} />
        <span className="mono" style={{ fontSize: 11, color: "var(--text-3)" }}>{file}</span>
      </div>
      {rows.map(([sign, ln], i) => {
        const bg = sign === "-" ? "rgba(248,113,113,.06)" : sign === "+" ? "rgba(52,211,153,.06)" : "transparent";
        const mk = sign === "-" ? "var(--bad)" : sign === "+" ? "var(--good)" : "var(--text-4)";
        return (
          <div key={i} className="mono" style={{ display: "flex", fontSize: 12, lineHeight: 1.6, background: bg }}>
            <span style={{ width: 22, textAlign: "center", color: mk, flexShrink: 0, userSelect: "none", opacity: .8 }}>{sign === " " ? "" : sign}</span>
            <span style={{ color: ln.trimStart().startsWith("//") ? "var(--text-4)" : "var(--text-2)", whiteSpace: "pre-wrap", paddingRight: 12 }}>{ln}</span>
          </div>
        );
      })}
    </div>
  );
}
function PropsTable({ head = ["Prop", "Type", "Default", "Notes"], rows }) {
  return (
    <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
      <thead><tr>{head.map(h => <th key={h} style={{ padding: "7px 12px", textAlign: "left", color: "var(--text-3)", fontWeight: 500, fontSize: 10.5, letterSpacing: ".06em", textTransform: "uppercase", borderBottom: "1px solid var(--border)", whiteSpace: "nowrap" }}>{h}</th>)}</tr></thead>
      <tbody>
        {rows.map((r, i) => (
          <tr key={i} style={{ borderBottom: "1px solid var(--border-soft)" }}>
            {r.map((cell, j) => <td key={j} className={j < 3 ? "mono" : ""} style={{ padding: "8px 12px", fontSize: j < 3 ? 12.5 : 13, color: j === 0 ? "var(--accent)" : j === 1 ? "var(--good)" : j === 2 ? "var(--text-3)" : "var(--text-2)", whiteSpace: j === 3 ? "normal" : "nowrap", verticalAlign: "top" }}>{cell}</td>)}
          </tr>
        ))}
      </tbody>
    </table>
  );
}
function TokenChip({ t, note }) {
  return (
    <span className="mono" style={{ display: "inline-flex", alignItems: "center", gap: 7, padding: "3px 10px", borderRadius: 99, background: "var(--panel-3)", border: "1px solid var(--border)", fontSize: 11, color: "var(--text-2)" }}>
      <span style={{ width: 10, height: 10, borderRadius: 3, background: `var(${t})`, border: "1px solid rgba(255,255,255,.14)" }} />{t}{note && <span style={{ color: "var(--text-4)" }}>· {note}</span>}
    </span>
  );
}
function Note({ n, children }) {
  return (
    <div style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
      <span style={{ flexShrink: 0, width: 18, height: 18, borderRadius: 99, background: "var(--accent-soft)", border: "1px solid var(--accent-line)", color: "var(--accent)", fontSize: 10, fontWeight: 700, display: "inline-flex", alignItems: "center", justifyContent: "center", marginTop: 1 }}>{n}</span>
      <span style={{ fontSize: 13, color: "var(--text-2)", lineHeight: 1.6 }}>{children}</span>
    </div>
  );
}

/* ──────────────────────────────────────────────────────────────────────────
   STEP-CARD MOCKS — faithful reproductions of screen-builder.jsx StepCard
   ────────────────────────────────────────────────────────────────────────── */
const STEPS = [
  { id: "a", name: "Null & range checks", type: "Validation", position: 0 },
  { id: "b", name: "Currency normaliser",  type: "Transform",  position: 1 },
  { id: "c", name: "Dedup + flag late",    type: "Mixed",      position: 2 },
];

/* function-row line, as inside the real StepCard */
function FnLine({ name, kind }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 7, padding: "5px 4px", borderBottom: "1px solid var(--border-soft)" }}>
      <span style={{ fontSize: 10, color: "var(--text-4)", width: 10, flexShrink: 0 }}>▸</span>
      <span style={{ fontSize: 12, fontWeight: 500 }}>{name}</span>
      <span className="mono" style={{ fontSize: 10, padding: "1px 5px", borderRadius: 99, background: "var(--panel-3)", color: "var(--text-3)" }}>{kind}</span>
    </div>
  );
}

/* BEFORE — current StepCard: whole card draggable, "#position" grey pill */
function StepCardBefore({ step }) {
  return (
    <div style={{ background: "var(--panel)", border: "1px solid var(--border)", borderRadius: "var(--radius-lg)", padding: "12px 14px", display: "flex", flexDirection: "column", gap: 8, cursor: "grab" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
        <span style={{ fontSize: 10, fontWeight: 700, background: "var(--panel-3)", color: "var(--text-3)", borderRadius: 99, padding: "2px 7px", flexShrink: 0 }}>
          {"#" + step.position}
        </span>
        <span style={{ fontWeight: 600, fontSize: 13, flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{step.name}</span>
        <TypeBadge type={step.type} />
        <span style={{ color: "var(--text-4)", fontSize: 16, lineHeight: 1, padding: "2px 4px" }}>x</span>
      </div>
      <FnLine name={step.name === "Currency normaliser" ? "to_usd" : "check_nulls"} kind={step.type === "Transform" ? "transform" : "validation"} />
    </div>
  );
}

/* AFTER — order badge = drag handle (only it is draggable), index-based number */
function StepCardAfter({ step, n, dragging, handleProps }) {
  return (
    <div style={{ background: "var(--panel)", border: "1px solid " + (dragging ? "var(--accent-line)" : "var(--border)"), borderRadius: "var(--radius-lg)", padding: "12px 14px", display: "flex", flexDirection: "column", gap: 8, opacity: dragging ? 0.4 : 1, transition: "opacity .15s, border-color .15s" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 9 }}>
        <span {...handleProps}><OrderBadge n={n} dragging={dragging} /></span>
        <span style={{ fontWeight: 600, fontSize: 13, flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{step.name}</span>
        <TypeBadge type={step.type} />
        <span style={{ color: "var(--text-4)", fontSize: 16, lineHeight: 1, padding: "2px 4px", cursor: "pointer" }}>x</span>
      </div>
      <FnLine name={step.name === "Currency normaliser" ? "to_usd" : "check_nulls"} kind={step.type === "Transform" ? "transform" : "validation"} />
    </div>
  );
}

/* live reorderable stack — proves the order numbers recompute on drag */
function LiveReorder() {
  const [list, setList] = useState(STEPS);
  const [dragIdx, setDragIdx] = useState(null);
  const fromRef = useRef(null);

  function onDragStart(i) { fromRef.current = i; setDragIdx(i); }
  function onDragEnd() { fromRef.current = null; setDragIdx(null); }
  function onDragOver(e, over) {
    e.preventDefault();
    const from = fromRef.current;
    if (from === null || from === over) return;
    const next = [...list];
    const [moved] = next.splice(from, 1);
    next.splice(over, 0, moved);
    fromRef.current = over; setDragIdx(over);
    setList(next);
  }

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
      {list.map((step, i) => (
        <div key={step.id} onDragOver={e => onDragOver(e, i)}>
          <StepCardAfter
            step={step}
            n={i + 1}
            dragging={dragIdx === i}
            handleProps={{
              draggable: true,
              onDragStart: () => onDragStart(i),
              onDragEnd,
              style: { display: "inline-flex" },
            }}
          />
        </div>
      ))}
    </div>
  );
}

/* column-binding row — the PendingStepCard checkbox list, before & after */
function ColRowBefore({ col, checked, onToggle }) {
  return (
    <label style={{ display: "flex", alignItems: "center", gap: 5, cursor: "pointer", fontSize: 11, padding: "3px 0", color: checked ? "var(--accent)" : "var(--text)", fontWeight: checked ? 600 : 400 }}>
      <input type="checkbox" checked={checked} onChange={onToggle} style={{ cursor: "pointer" }} />
      <span className="mono">{col.name}</span>
      <span style={{ fontSize: 10, color: "var(--text-4)" }}>{col.type}</span>
    </label>
  );
}
function ColRowAfter({ col, checked, onToggle }) {
  return (
    <div onClick={() => onToggle()} style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", fontSize: 11, padding: "4px 0", color: checked ? "var(--accent)" : "var(--text)", fontWeight: checked ? 600 : 400 }}>
      <Checkbox checked={checked} onChange={onToggle} />
      <span className="mono">{col.name}</span>
      <span style={{ fontSize: 10, color: "var(--text-4)" }}>{col.type}</span>
    </div>
  );
}
const COLS = [
  { id: 1, name: "amount", type: "float" },
  { id: 2, name: "currency", type: "str" },
  { id: 3, name: "txn_date", type: "date" },
];
function ColList({ variant }) {
  const [sel, setSel] = useState({ 1: true, 2: true });
  const toggle = id => setSel(p => ({ ...p, [id]: !p[id] }));
  const Row = variant === "after" ? ColRowAfter : ColRowBefore;
  return (
    <div style={{ border: "1px solid var(--border)", borderRadius: "var(--radius)", padding: "6px 10px", background: "var(--panel-2)", display: "flex", flexDirection: "column", gap: 2 }}>
      <div style={{ fontSize: 10, color: "var(--text-3)", marginBottom: 4 }}>Bind column(s) to <span className="mono" style={{ color: "var(--accent)" }}>cols</span>:</div>
      {COLS.map(c => <Row key={c.id} col={c} checked={!!sel[c.id]} onToggle={() => toggle(c.id)} />)}
    </div>
  );
}

/* checkbox state gallery */
function CheckboxStates() {
  const [a, setA] = useState(true);
  const [b, setB] = useState(false);
  const cell = (label, node) => (
    <div style={{ display: "flex", flexDirection: "column", gap: 10, alignItems: "center" }}>
      {node}
      <span className="mono" style={{ fontSize: 10.5, color: "var(--text-4)" }}>{label}</span>
    </div>
  );
  return (
    <div style={{ display: "flex", flexWrap: "wrap", gap: 30, alignItems: "flex-start" }}>
      {cell("unchecked", <Checkbox checked={false} onChange={() => {}} />)}
      {cell("checked", <Checkbox checked={true} onChange={() => {}} />)}
      {cell("disabled", <Checkbox checked={false} disabled onChange={() => {}} />)}
      {cell("disabled · checked", <Checkbox checked={true} disabled onChange={() => {}} />)}
      <div style={{ width: 1, alignSelf: "stretch", background: "var(--border)" }} />
      {cell("live — click", <div style={{ display: "flex", gap: 12 }}><Checkbox checked={a} onChange={setA} /><Checkbox checked={b} onChange={setB} /></div>)}
    </div>
  );
}

/* order-badge state gallery */
function BadgeStates() {
  const cell = (label, node) => (
    <div style={{ display: "flex", flexDirection: "column", gap: 10, alignItems: "center" }}>
      {node}
      <span className="mono" style={{ fontSize: 10.5, color: "var(--text-4)" }}>{label}</span>
    </div>
  );
  return (
    <div style={{ display: "flex", flexWrap: "wrap", gap: 30, alignItems: "flex-start" }}>
      {cell("rest", <OrderBadge n={1} />)}
      {cell("hover → grip (hover me)", <OrderBadge n={2} />)}
      {cell("dragging", <OrderBadge n={3} dragging />)}
    </div>
  );
}

/* ──────────────────────────────────────────────────────────────────────────
   PAGE
   ────────────────────────────────────────────────────────────────────────── */
function App() {
  return (
    <div style={{ maxWidth: 1000, margin: "0 auto", padding: "56px 28px 120px" }}>

      {/* Masthead */}
      <header style={{ display: "flex", flexDirection: "column", gap: 18, marginBottom: 40 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="3" width="8" height="8" rx="2" fill="var(--accent)" />
            <rect x="13" y="3" width="8" height="8" rx="2" fill="var(--accent)" opacity=".5" />
            <rect x="3" y="13" width="8" height="8" rx="2" fill="var(--accent)" opacity=".5" />
            <rect x="13" y="13" width="8" height="8" rx="2" fill="var(--accent)" />
          </svg>
          <span style={{ fontSize: 14, fontWeight: 600, letterSpacing: ".02em" }}>pipeui</span>
          <span style={{ width: 1, height: 14, background: "var(--border)" }} />
          <span className="mono" style={{ fontSize: 12, color: "var(--text-3)" }}>screen-builder.jsx · StepCard + PendingStepCard</span>
          <span className="mono" style={{ fontSize: 11, color: "var(--accent)", background: "var(--accent-soft)", border: "1px solid var(--accent-line)", borderRadius: 99, padding: "2px 9px" }}>feat/builder-step-cards-redesign</span>
        </div>

        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          <Eyebrow>Design Brief · Issue #118</Eyebrow>
          <h1 style={{ fontSize: 34, fontWeight: 600, letterSpacing: "-.02em", lineHeight: 1.12 }}>Builder step cards — order badge &amp; column checkboxes</h1>
          <p style={{ fontSize: 15, color: "var(--text-2)", maxWidth: 720, lineHeight: 1.6 }}>
            The written spec that unblocks <M>#118</M>. It defines an order-number badge that doubles as the step card's drag handle, replaces the raw HTML column checkboxes with a design-system <M>Checkbox</M> primitive, and names the two additions to <M>ui.jsx</M>. Everything below is <strong style={{ color: "var(--text)", fontWeight: 600 }}>rendered live</strong> with the real tokens — drag the cards, click the boxes. Claude Code implements directly from it.
          </p>
        </div>

        <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginTop: 2 }}>
          {[["Order badge", "var(--accent)"], ["= drag handle", "var(--accent)"], ["Index-based renumber", "var(--good)"], ["Checkbox primitive", "var(--accent)"], ["Raw <input> removed", "var(--bad)"], ["ui.jsx +2", "var(--good)"]].map(([t, c]) => (

                "The OrderBadge is the only drag handle: draggable + onDragStart/onDragEnd live on it; the card root keeps onDragOver as the drop target and drops cursor:grab.",
                "Badge states match the spec: rest (--panel-3 / --text-2), hover (--hover / --accent-line, grip glyph), dragging (--accent-soft / --accent).",
                "Column multi-select uses the new Checkbox primitive; raw <input type=\"checkbox\"> is removed from PendingStepCard. Selection logic (handleColumnToggle) is unchanged.",
                "Checkbox states match the spec and use only existing tokens (--panel-2, --border, --accent-line, --accent, --accent-ink); keyboard toggle (Space / Enter) works.",
                "Checkbox and OrderBadge are exported from ui.jsx on window.__UI__. No new external dependencies.",
                "All existing step-card behaviour preserved: remove, output-mode select, expandable function rows, result tag, pending-step binding.",
              ].map((t, i) => (
                <div key={i} style={{ display: "flex", gap: 10, alignItems: "flex-start", padding: "8px 0", borderBottom: i < 7 ? "1px solid var(--border-soft)" : "none" }}>
                  <span style={{ flexShrink: 0, width: 17, height: 17, borderRadius: "var(--radius)", border: "1px solid var(--border)", background: "var(--panel-2)", display: "inline-flex", alignItems: "center", justifyContent: "center", marginTop: 1, color: "var(--accent)" }}><Icon name="check" size={11} /></span>
                  <span style={{ fontSize: 13, color: "var(--text-2)", lineHeight: 1.6 }}>{t}</span>
                </div>
              ))}
            </div>
          </Card>
        </Section>

        <footer style={{ marginTop: 12, paddingTop: 24, borderTop: "1px solid var(--border)", display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
          <span className="mono" style={{ fontSize: 11, color: "var(--text-4)" }}>pipeui · design brief · issue #118</span>
          <span style={{ width: 1, height: 12, background: "var(--border)" }} />
          <span className="mono" style={{ fontSize: 11, color: "var(--text-4)" }}>feat/builder-step-cards-redesign</span>
          <span style={{ marginLeft: "auto", fontSize: 11, color: "var(--text-4)" }}>Paste below the line in #118 · remove the block notice · relabel ready-for-agent</span>
        </footer>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
