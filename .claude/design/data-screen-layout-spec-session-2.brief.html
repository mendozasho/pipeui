<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PipeUI — Data Screen Layout Spec · Session 2</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e10; --panel: #141416; --panel-2: #1a1a1d; --panel-3: #202024;
    --border: rgba(255,255,255,0.08); --border-soft: rgba(255,255,255,0.04); --hover: rgba(255,255,255,0.06);
    --text: #f0f0f2; --text-2: #a0a0aa; --text-3: #6a6a74; --text-4: #3a3a42;
    --good: #34d399; --bad: #f87171; --warn: #fbbf24; --run: #60a5fa;
    --accent: #7c6cf5; --accent-soft: rgba(124,108,245,0.12); --accent-line: rgba(124,108,245,0.4); --accent-ink: #fff;
    --check: #60a5fa; --check-bg: rgba(96,165,250,0.1); --xform: #fbbf24; --xform-bg: rgba(251,191,36,0.1);
    --radius: 6px; --radius-lg: 10px;
    font-family: 'Geist', system-ui, sans-serif;
    font-size: 14px;
  }

  body { background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; line-height: 1.5; }

  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.16); }

  .mono { font-family: 'Geist Mono', ui-monospace, monospace; }

  /* top scanline accent */
  body::before {
    content: ""; position: fixed; inset: 0 0 auto 0; height: 2px; z-index: 50;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: .5;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
const { useState } = React;

/* ──────────────────────────────────────────────────────────────────────────
   Existing PipeUI primitives (subset, lifted verbatim from ui.jsx for context),
   plus the proposed GroupHeader + one new `group` glyph — all rendered live.
   ────────────────────────────────────────────────────────────────────────── */
const ICONS = {
  chevron: <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="m7 8 3 3 3-3"/></svg>,
  check:   <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="2"><path d="m4 10 4.5 4.5L16 6"/></svg>,
  data:    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.5"><ellipse cx="10" cy="5" rx="7" ry="2.5"/><path d="M3 5v5c0 1.38 3.13 2.5 7 2.5s7-1.12 7-2.5V5"/><path d="M3 10v5c0 1.38 3.13 2.5 7 2.5s7-1.12 7-2.5v-5"/></svg>,
  /* NEW this session — a "stack" glyph that anchors a pattern group */
  group:   <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M10 2.5 3 6l7 3.5L17 6l-7-3.5z"/><path d="m3 10 7 3.5L17 10"/><path d="m3 13.5 7 3.5 7-3.5"/></svg>,
};
function Icon({ name, size = 16, style }) {
  const svg = ICONS[name]; if (!svg) return null;
  return <span style={{ display: "inline-flex", alignItems: "center", width: size, height: size, flexShrink: 0, ...style }}>{React.cloneElement(svg, { width: size, height: size })}</span>;
}

function StatusPill({ status }) {
  const map = {
    registered: { color: "var(--text-3)", bg: "var(--panel-3)" },
    ingested:   { color: "var(--good)",   bg: "rgba(52,211,153,.1)" },
  };
  const s = map[status] || map.registered;
  return <span style={{ display: "inline-block", padding: "2px 8px", borderRadius: 99, background: s.bg, color: s.color, fontSize: 11, fontWeight: 600, letterSpacing: ".03em" }}>{status}</span>;
}

function SourceBadge({ name, size = 28, style }) {
  const initials = name.slice(0, 2).toUpperCase();
  const hue = [...name].reduce((h, c) => h + c.charCodeAt(0), 0) % 360;
  return <span style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: size, height: size, borderRadius: "var(--radius)", background: `hsl(${hue},50%,22%)`, color: `hsl(${hue},70%,70%)`, fontSize: size * 0.39, fontWeight: 700, flexShrink: 0, ...style }}>{initials}</span>;
}

function RunBtn({ small }) {
  return <button style={{ padding: small ? "3px 10px" : "4px 12px", fontSize: 12, fontWeight: 600, background: "var(--accent)", color: "var(--accent-ink)", border: "none", borderRadius: "var(--radius)", cursor: "pointer", whiteSpace: "nowrap" }}>Run</button>;
}

/* ── NEW · GroupHeader — the one new shared primitive this session ──────────── */
function GroupHeader({ name, count, rowCount, colSpan, collapsed, onToggle }) {
  return (
    <tr>
      <td colSpan={colSpan} style={{ background: "var(--panel-2)", borderTop: "1px solid var(--border)", borderBottom: "1px solid var(--border-soft)", padding: "7px 12px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <button onClick={onToggle} aria-expanded={!collapsed} aria-label={collapsed ? "Expand group" : "Collapse group"} style={{ background: "none", border: "none", cursor: "pointer", color: "var(--text-3)", display: "inline-flex", alignItems: "center", padding: 0, transform: collapsed ? "rotate(-90deg)" : "none", transition: "transform .15s" }}>
            <Icon name="chevron" size={16} />
          </button>
          <Icon name="group" size={15} style={{ color: "var(--text-3)" }} />
          <span className="mono" style={{ fontSize: 12.5, color: "var(--text-2)", fontWeight: 500 }}>{name}</span>
          <span style={{ fontSize: 11, color: "var(--text-3)", background: "var(--panel-3)", border: "1px solid var(--border)", borderRadius: 99, padding: "1px 8px", whiteSpace: "nowrap" }}>{count} sources</span>
          <span className="mono" style={{ marginLeft: "auto", fontSize: 12, color: "var(--text-3)", fontVariantNumeric: "tabular-nums", whiteSpace: "nowrap" }}>{rowCount.toLocaleString()} rows</span>
        </div>
      </td>
    </tr>
  );
}

/* A single source row — encodes the prominence hierarchy. */
function SourceRow({ s, grouped }) {
  const ingested = !!s.ingested;
  const [hover, setHover] = useState(false);
  return (
    <tr onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
        style={{ borderBottom: "1px solid var(--border-soft)", background: hover ? "var(--hover)" : "transparent", cursor: "pointer", transition: "background .1s" }}>
      <td style={{ padding: "9px 12px", paddingLeft: grouped ? 34 : 12 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <SourceBadge name={s.name} />
          <div>
            <div style={{ fontWeight: 500, color: "var(--text)", fontSize: 13.5 }}>{s.name}</div>
            <div className="mono" style={{ fontSize: 11, color: "var(--text-3)" }}>{s.cols} columns</div>
          </div>
        </div>
      </td>
      <td className="mono" style={{ padding: "9px 12px", textAlign: "right", fontSize: 13, fontWeight: 500, color: ingested ? "var(--text)" : "var(--text-4)", fontVariantNumeric: "tabular-nums" }}>
        {ingested ? s.rows.toLocaleString() : "—"}
      </td>
      <td style={{ padding: "9px 12px", fontSize: 12, color: "var(--text-3)", whiteSpace: "nowrap" }}>{s.ingested || "—"}</td>
      <td style={{ padding: "9px 12px" }}><StatusPill status={s.status} /></td>
      <td style={{ padding: "9px 12px", textAlign: "right" }}><RunBtn /></td>
    </tr>
  );
}

/* ── DEMO DATA ─────────────────────────────────────────────────────────────── */
const UNGROUPED = [
  { name: "returns_q4", cols: 14, rows: 3401, ingested: "Jun 6", status: "ingested" },
  { name: "price_book", cols: 9, rows: null, ingested: null, status: "registered" },
];
const GROUPS = [
  { key: "sales_jan_*", count: 3, rowCount: 21693, rows: [
    { name: "sales_jan_east", cols: 22, rows: 12480, ingested: "Jun 9", status: "ingested" },
    { name: "sales_jan_west", cols: 22, rows: 9213, ingested: "Jun 9", status: "ingested" },
    { name: "sales_jan_north", cols: 22, rows: null, ingested: null, status: "registered" },
  ] },
  { key: "crm_export_*", count: 2, rowCount: 100015, rows: [
    { name: "crm_accounts", cols: 31, rows: 48902, ingested: "Jun 7", status: "ingested" },
    { name: "crm_contacts", cols: 27, rows: 51113, ingested: "Jun 7", status: "ingested" },
  ] },
];

const TH = ({ children, align = "left", w }) => (
  <th style={{ padding: "8px 12px", textAlign: align, color: "var(--text-3)", fontWeight: 500, fontSize: 10.5, letterSpacing: ".06em", borderBottom: "1px solid var(--border)", whiteSpace: "nowrap", width: w }}>{children}</th>
);

/* The headline live preview: the full proposed grouped Data table. */
function GroupedTablePreview() {
  const [collapsed, setCollapsed] = useState({});
  const toggle = k => setCollapsed(c => ({ ...c, [k]: !c[k] }));
  return (
    <div style={{ background: "var(--panel)", border: "1px solid var(--border)", borderRadius: "var(--radius-lg)", overflow: "hidden" }}>
      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
        <thead>
          <tr>
            <TH>SOURCE</TH>
            <TH align="right" w={110}>ROWS</TH>
            <TH w={130}>LAST INGESTED</TH>
            <TH w={110}>STATUS</TH>
            <TH align="right" w={80}></TH>
          </tr>
        </thead>
        <tbody>
          {UNGROUPED.map(s => <SourceRow key={s.name} s={s} />)}
          {GROUPS.map(g => (
            <React.Fragment key={g.key}>
              <GroupHeader name={g.key} count={g.count} rowCount={g.rowCount} colSpan={5} collapsed={!!collapsed[g.key]} onToggle={() => toggle(g.key)} />
              {!collapsed[g.key] && g.rows.map(s => <SourceRow key={s.name} s={s} grouped />)}
            </React.Fragment>
          ))}
        </tbody>
      </table>
    </div>
  );
}

/* Side-by-side: a mini card-grid mock (rejected) vs the table (chosen). */
function MiniCardGrid() {
  const cards = [["sales_jan_east", 12480, "Jun 9"], ["sales_jan_west", 9213, "Jun 9"], ["crm_accounts", 48902, "Jun 7"], ["returns_q4", 3401, "Jun 6"]];
  return (
    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
      {cards.map(([n, r, d]) => (
        <div key={n} style={{ background: "var(--panel)", border: "1px solid var(--border)", borderRadius: "var(--radius)", padding: 11, display: "flex", flexDirection: "column", gap: 8 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
            <SourceBadge name={n} size={20} />
            <span style={{ fontSize: 11.5, fontWeight: 500 }}>{n}</span>
          </div>
          <div className="mono" style={{ fontSize: 15, color: "var(--text)", fontVariantNumeric: "tabular-nums" }}>{r.toLocaleString()}</div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 10, color: "var(--text-3)" }}>
            <span>{d}</span><StatusPill status="ingested" />
          </div>
        </div>
      ))}
    </div>
  );
}
function MiniTable() {
  const rows = [["sales_jan_east", 12480], ["sales_jan_west", 9213], ["crm_accounts", 48902], ["returns_q4", 3401]];
  return (
    <div style={{ background: "var(--panel)", border: "1px solid var(--border)", borderRadius: "var(--radius)", overflow: "hidden" }}>
      <table style={{ width: "100%", borderCollapse: "collapse" }}>
        <tbody>
          {rows.map(([n, r], i) => (
            <tr key={n} style={{ borderBottom: i < 3 ? "1px solid var(--border-soft)" : "none" }}>
              <td style={{ padding: "8px 11px" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
                  <SourceBadge name={n} size={18} />
                  <span style={{ fontSize: 11.5 }}>{n}</span>
                </div>
              </td>
              <td className="mono" style={{ padding: "8px 11px", textAlign: "right", fontSize: 12, fontWeight: 500, color: "var(--text)", fontVariantNumeric: "tabular-nums" }}>{r.toLocaleString()}</td>
              <td style={{ padding: "8px 11px", textAlign: "right" }}><StatusPill status="ingested" /></td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

/* Annotated single row that calls out the prominence tiers. */
function HierarchyDiagram() {
  const Tier = ({ n, label, color }) => (
    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
      <span style={{ width: 18, height: 18, borderRadius: 99, background: color, color: "#0e0e10", fontSize: 10, fontWeight: 700, display: "inline-flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>{n}</span>
      <span style={{ fontSize: 12, color: "var(--text-2)" }}>{label}</span>
    </div>
  );
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      <div style={{ background: "var(--panel)", border: "1px solid var(--border)", borderRadius: "var(--radius)", overflow: "hidden" }}>
        <table style={{ width: "100%", borderCollapse: "collapse" }}>
          <tbody>
            <tr>
              <td style={{ padding: "11px 14px" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 11 }}>
                  <SourceBadge name="sales_jan_east" size={30} />
                  <div>
                    <div style={{ fontWeight: 500, color: "var(--text)", fontSize: 14, outline: "1.5px dashed var(--accent)", outlineOffset: 3, borderRadius: 2 }}>sales_jan_east</div>
                    <div className="mono" style={{ fontSize: 11, color: "var(--text-3)", marginTop: 3 }}>22 columns</div>
                  </div>
                </div>
              </td>
              <td style={{ padding: "11px 14px", textAlign: "right" }}>
                <span className="mono" style={{ fontSize: 13.5, fontWeight: 500, color: "var(--text)", outline: "1.5px dashed var(--good)", outlineOffset: 3, borderRadius: 2, fontVariantNumeric: "tabular-nums" }}>12,480</span>
              </td>
              <td style={{ padding: "11px 14px" }}>
                <span style={{ fontSize: 12, color: "var(--text-3)", outline: "1.5px dashed var(--text-3)", outlineOffset: 3, borderRadius: 2 }}>Jun 9</span>
              </td>
              <td style={{ padding: "11px 14px" }}>
                <span style={{ outline: "1.5px dashed var(--text-3)", outlineOffset: 3, borderRadius: 99, display: "inline-block" }}><StatusPill status="ingested" /></span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: "10px 28px" }}>
        <Tier n="1" label="Primary — source name + badge · the identifier you look up" color="var(--accent)" />
        <Tier n="2" label="Secondary — row count · mono, tabular, right-aligned to scan down" color="var(--good)" />
        <Tier n="3" label="Tertiary — last ingested + status pill · muted, supporting" color="var(--text-3)" />
      </div>
    </div>
  );
}

/* ──────────────────────────────────────────────────────────────────────────
   SNIPPETS — plain strings so embedded JSX isn't re-parsed by Babel.
   ────────────────────────────────────────────────────────────────────────── */
const SNIPPETS = {
  groupHeader:
`// NEW · ui.jsx — full-span band that introduces a pattern group.
// Renders as a <tr> so it lives INSIDE the existing <table>; member
// rows follow beneath it. No new colour tokens; one new glyph (\`group\`).
function GroupHeader({ name, count, rowCount, colSpan, collapsed, onToggle }) {
  return (
    <tr>
      <td colSpan={colSpan} style={{
        background: "var(--panel-2)",
        borderTop: "1px solid var(--border)",
        borderBottom: "1px solid var(--border-soft)",
        padding: "7px 12px",
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <button onClick={onToggle} aria-expanded={!collapsed}
            aria-label={collapsed ? "Expand group" : "Collapse group"}
            style={{ background: "none", border: "none", cursor: "pointer",
              color: "var(--text-3)", padding: 0, display: "inline-flex",
              transform: collapsed ? "rotate(-90deg)" : "none",
              transition: "transform .15s" }}>
            <Icon name="chevron" size={16} />
          </button>
          <Icon name="group" size={15} style={{ color: "var(--text-3)" }} />
          <span className="mono" style={{ fontSize: 12.5, color: "var(--text-2)", fontWeight: 500 }}>{name}</span>
          <span style={{ fontSize: 11, color: "var(--text-3)", background: "var(--panel-3)",
            border: "1px solid var(--border)", borderRadius: 99, padding: "1px 8px", whiteSpace: "nowrap" }}>{count} sources</span>
          <span className="mono" style={{ marginLeft: "auto", fontSize: 12, color: "var(--text-3)",
            fontVariantNumeric: "tabular-nums", whiteSpace: "nowrap" }}>{rowCount.toLocaleString()} rows</span>
        </div>
      </td>
    </tr>
  );
}

// NEW glyph — add to the ICONS map in ui.jsx:
group: <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.5">
  <path d="M10 2.5 3 6l7 3.5L17 6l-7-3.5z"/><path d="m3 10 7 3.5L17 10"/><path d="m3 13.5 7 3.5 7-3.5"/>
</svg>,`,

  dataTable:
`// MODIFY · ui.jsx — DataTable gains an optional \`groups\` prop.
// When omitted, DataTable behaves EXACTLY as today (functions, sets,
// results screens are untouched). When present, ungrouped \`rows\` render
// first, then each group renders a GroupHeader + its member rows.
function DataTable({ columns, rows, groups, onRowClick, selectedId }) {
  const [collapsed, setCollapsed] = useState({});            // group key -> bool
  const toggle = k => setCollapsed(c => ({ ...c, [k]: !c[k] }));

  const renderRow = (row, key, indent) => (
    <tr key={key} onClick={() => onRowClick && onRowClick(row)}
        /* …existing hover + selected styling… */
        style={{ /* …unchanged… */ }}>
      {columns.map(c => (
        <td key={c.key} style={{ padding: "9px 12px",
          paddingLeft: indent ? 34 : 12, color: "var(--text)", verticalAlign: "middle" }}>
          {c.render ? c.render(row[c.key], row) : row[c.key]}
        </td>
      ))}
    </tr>
  );

  return (
    <div style={{ overflowX: "auto" }}>
      <table /* …unchanged head… */>
        <tbody>
          {rows.map((r, i) => renderRow(r, r.id ?? i, false))}
          {(groups || []).map(g => (
            <React.Fragment key={g.key}>
              <GroupHeader name={g.label} count={g.rows.length} rowCount={g.rowCount}
                colSpan={columns.length} collapsed={collapsed[g.key]}
                onToggle={() => toggle(g.key)} />
              {!collapsed[g.key] && g.rows.map((r, i) => renderRow(r, g.key + i, true))}
            </React.Fragment>
          ))}
          {rows.length === 0 && (groups || []).length === 0 && (
            /* …existing "No data yet" empty row… */
          )}
        </tbody>
      </table>
    </div>
  );
}`,

  screenData:
`// MODIFY · screen-data.jsx — ScreenData()

// 1 · Drop the "Method" column from \`columns\`. ingestion_method is
//     registration config, already shown in the drawer ("Ingestion" KV).
//     It is not status — removing it tightens the row and clarifies hierarchy.
//     DELETE this block:
//   { key: "ingestion_method", label: "Method",
//     render: v => <span style={{ fontSize: 12, color: "var(--text-3)" }}>{v}</span> },

// 2 · Partition sources by their pattern label (display-only; the grouping
//     key is the human-readable \`pattern\`. Sources with no pattern stay flat).
const grouped = {}, flat = [];
for (const s of sources) {
  if (s.pattern_label) (grouped[s.pattern_label] ??= []).push(s);
  else flat.push(s);
}
const groups = Object.entries(grouped).map(([label, rows]) => ({
  key: label, label,
  rows: rows.map(s => ({ ...s, id: s.source_id })),
  rowCount: rows.reduce((n, s) => n + (s.date_ingested ? (s.row_count || 0) : 0), 0),
}));

// 3 · Pass both to the (back-compatible) DataTable:
<DataTable
  columns={columns}
  rows={flat.map(s => ({ ...s, id: s.source_id }))}
  groups={groups}
  onRowClick={row => setSelectedSource(row)}
  selectedId={selectedSource?.source_id}
/>`,

  exportReg:
`// end of ui.jsx
window.__UI__ = {
  Icon, Btn, KindTag, StatusPill, SourceBadge, DataTable, Flash, Drawer,
  Spinner, LoadingState, InlineError,   // Session 1
  GroupHeader,                          // ← added this session
};`,
};

/* ──────────────────────────────────────────────────────────────────────────
   DOC CHROME (matches Session 1)
   ────────────────────────────────────────────────────────────────────────── */
function Eyebrow({ children }) {
  return <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: ".14em", textTransform: "uppercase", color: "var(--accent)" }}>{children}</div>;
}
function Code({ text, file = "ui.jsx" }) {
  const lines = String(text).replace(/^\n/, "").replace(/\s+$/, "").split("\n");
  return (
    <div style={{ background: "#0a0a0c", border: "1px solid var(--border)", borderRadius: "var(--radius)", overflow: "hidden" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 7, padding: "7px 12px", borderBottom: "1px solid var(--border-soft)", background: "var(--panel-2)" }}>
        <span style={{ width: 8, height: 8, borderRadius: 99, background: "var(--text-4)" }} />
        <span className="mono" style={{ fontSize: 11, color: "var(--text-3)" }}>{file}</span>
      </div>
      <pre className="mono" style={{ margin: 0, padding: "14px 16px", fontSize: 12.5, lineHeight: 1.65, overflowX: "auto", color: "var(--text-2)" }}>
        {lines.map((ln, i) => {
          const isComment = ln.trimStart().startsWith("//");
          return <div key={i} style={{ color: isComment ? "var(--text-4)" : "var(--text-2)", whiteSpace: "pre" }}>{ln || " "}</div>;
        })}
      </pre>
    </div>
  );
}
function Preview({ children, label = "Preview", pad = 28, bg = "var(--panel-2)" }) {
  return (
    <div style={{ position: "relative", background: bg, border: "1px solid var(--border)", borderRadius: "var(--radius-lg)", padding: pad, backgroundImage: "radial-gradient(rgba(255,255,255,0.022) 1px, transparent 0)", backgroundSize: "16px 16px" }}>
      <span className="mono" style={{ position: "absolute", top: 10, right: 12, fontSize: 9.5, letterSpacing: ".12em", textTransform: "uppercase", color: "var(--text-4)" }}>{label}</span>
      {children}
    </div>
  );
}
function PropsTable({ rows }) {
  return (
    <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
      <thead>
        <tr>{["Prop", "Type", "Default", "Notes"].map(h => (
          <th key={h} style={{ padding: "7px 12px", textAlign: "left", color: "var(--text-3)", fontWeight: 500, fontSize: 10.5, letterSpacing: ".06em", textTransform: "uppercase", borderBottom: "1px solid var(--border)", whiteSpace: "nowrap" }}>{h}</th>
        ))}</tr>
      </thead>
      <tbody>
        {rows.map((r, i) => (
          <tr key={i} style={{ borderBottom: "1px solid var(--border-soft)" }}>
            <td className="mono" style={{ padding: "8px 12px", color: "var(--accent)", fontSize: 12.5, whiteSpace: "nowrap", verticalAlign: "top" }}>{r[0]}</td>
            <td className="mono" style={{ padding: "8px 12px", color: "var(--good)", fontSize: 12, verticalAlign: "top" }}>{r[1]}</td>
            <td className="mono" style={{ padding: "8px 12px", color: "var(--text-3)", fontSize: 12, whiteSpace: "nowrap", verticalAlign: "top" }}>{r[2]}</td>
            <td style={{ padding: "8px 12px", color: "var(--text-2)", verticalAlign: "top" }}>{r[3]}</td>
          </tr>
        ))}
      </tbody>
    </table>
  );
}
function TokenChips({ tokens }) {
  return (
    <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
      {tokens.map(t => (
        <span key={t} className="mono" style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "3px 9px", borderRadius: 99, background: "var(--panel-3)", border: "1px solid var(--border)", fontSize: 11, color: "var(--text-2)" }}>
          <span style={{ width: 9, height: 9, borderRadius: 3, background: `var(${t})`, border: "1px solid rgba(255,255,255,.12)" }} />{t}
        </span>
      ))}
    </div>
  );
}
function SubHead({ children }) {
  return <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: ".08em", textTransform: "uppercase", color: "var(--text-3)", marginBottom: 12 }}>{children}</div>;
}
function Block({ children, style }) {
  return <div style={{ display: "flex", flexDirection: "column", gap: 12, ...style }}>{children}</div>;
}
function Section({ id, children }) {
  return <section id={id} style={{ display: "flex", flexDirection: "column", gap: 20, scrollMarginTop: 24 }}>{children}</section>;
}
function Card({ children }) {
  return <div style={{ background: "var(--panel)", border: "1px solid var(--border)", borderRadius: "var(--radius-lg)", padding: 24, display: "flex", flexDirection: "column", gap: 20 }}>{children}</div>;
}

/* ──────────────────────────────────────────────────────────────────────────
   PAGE
   ────────────────────────────────────────────────────────────────────────── */
function App() {
  return (
    <div style={{ maxWidth: 960, margin: "0 auto", padding: "56px 28px 120px" }}>

      {/* Masthead */}
      <header style={{ display: "flex", flexDirection: "column", gap: 18, marginBottom: 40 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="3" width="8" height="8" rx="2" fill="var(--accent)" />
            <rect x="13" y="3" width="8" height="8" rx="2" fill="var(--accent)" opacity=".5" />
            <rect x="3" y="13" width="8" height="8" rx="2" fill="var(--accent)" opacity=".5" />
            <rect x="13" y="13" width="8" height="8" rx="2" fill="var(--accent)" />
          </svg>
          <span style={{ fontSize: 14, fontWeight: 600, letterSpacing: ".02em" }}>pipeui</span>
          <span style={{ width: 1, height: 14, background: "var(--border)" }} />
          <span className="mono" style={{ fontSize: 12, color: "var(--text-3)" }}>screen-data.jsx · feat/data-source-list-redesign</span>
        </div>

        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          <Eyebrow>Layout Spec · Session 2</Eyebrow>
          <h1 style={{ fontSize: 34, fontWeight: 600, letterSpacing: "-.02em", lineHeight: 1.12 }}>Data screen — source list redesign</h1>
          <p style={{ fontSize: 15, color: "var(--text-2)", maxWidth: 700, lineHeight: 1.6 }}>
            The handoff artifact for the source-list redesign. It settles the <strong style={{ color: "var(--text)", fontWeight: 600 }}>layout decision</strong> (table vs card grid), fixes the <strong style={{ color: "var(--text)", fontWeight: 600 }}>prominence hierarchy</strong>, and integrates the <strong style={{ color: "var(--text)", fontWeight: 600 }}>source grouping header</strong> from #112. Everything below is <strong style={{ color: "var(--text)", fontWeight: 600 }}>rendered live</strong> — what you see is the intended behaviour. Claude Code implements directly from these specs.
        </p>
        </div>

        <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginTop: 4 }}>
          {[["Table layout", "#7c6cf5"], ["GroupHeader", "#7c6cf5"], ["DataTable.groups", "#60a5fa"], ["−Method column", "#f87171"]].map(([t, c]) => (
            <span key={t} className="mono" style={{ fontSize: 11.5, padding: "4px 11px", borderRadius: 99, background: "var(--panel)", border: "1px solid var(--border)", color: "var(--text-2)", display: "inline-flex", alignItems: "center", gap: 7 }}>
              <span style={{ width: 7, height: 7, borderRadius: 99, background: c }} />{t}
            </span>
          ))}
        </div>
      </header>

      {/* Constraints banner */}
      <div style={{ display: "flex", gap: 12, alignItems: "flex-start", padding: "14px 16px", background: "var(--accent-soft)", border: "1px solid var(--accent-line)", borderRadius: "var(--radius)", marginBottom: 44 }}>
        <Icon name="check" size={15} style={{ color: "var(--accent)", marginTop: 1 }} />
        <div style={{ fontSize: 12.5, color: "var(--text-2)", lineHeight: 1.6 }}>
          <strong style={{ color: "var(--text)", fontWeight: 600 }}>Constraints honoured throughout.</strong> Inline styles only — no CSS classes, no stylesheet additions. No new dependencies. <strong style={{ color: "var(--text)", fontWeight: 600 }}>No new colour tokens</strong> — every element maps to an existing <span className="mono" style={{ color: "var(--text)" }}>index.html</span> token. One new shared component (<span className="mono" style={{ color: "var(--text)" }}>GroupHeader</span>) and one new <span className="mono" style={{ color: "var(--text)" }}>Icon</span> glyph (<span className="mono" style={{ color: "var(--text)" }}>group</span>). <span className="mono" style={{ color: "var(--text)" }}>DataTable</span>'s new <span className="mono" style={{ color: "var(--text)" }}>groups</span> prop is optional — every other screen using it is untouched.
        </div>
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 56 }}>

        {/* ITEM 0 — THE LIVE TARGET */}
        <Section id="target">
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            <Eyebrow>The target</Eyebrow>
            <h2 style={{ fontSize: 23, fontWeight: 600, letterSpacing: "-.01em" }}>What ships</h2>
            <p style={{ fontSize: 14, color: "var(--text-2)", maxWidth: 720, lineHeight: 1.6 }}>The redesigned source list. Two standalone sources sit flat at the top; pattern-grouped sources cluster under collapsible <span className="mono" style={{ color: "var(--text)" }}>GroupHeader</span> bands. <strong style={{ color: "var(--text)", fontWeight: 600 }}>Click a group chevron</strong> to collapse it — the core density lever for an analyst managing many sources.</p>
          </div>
          <Card>
            <Preview label="Live · interactive" pad={20}><GroupedTablePreview /></Preview>
            <div style={{ fontSize: 12.5, color: "var(--text-3)", lineHeight: 1.6 }}>
              Row click still opens the source drawer (unchanged). The per-row <span className="mono" style={{ color: "var(--text)" }}>Run</span> button and <span className="mono" style={{ color: "var(--text)" }}>StatusPill</span> are preserved. The <span className="mono" style={{ color: "var(--text)" }}>Method</span> column is gone — see the hierarchy section for why.
            </div>
          </Card>
        </Section>

        {/* ITEM 1 — DECISION */}
        <Section id="decision">
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            <Eyebrow>Decision 1</Eyebrow>
            <h2 style={{ fontSize: 23, fontWeight: 600, letterSpacing: "-.01em" }}>Table, not a card grid</h2>
            <p style={{ fontSize: 14, color: "var(--text-2)", maxWidth: 720, lineHeight: 1.6 }}>The screen's job is to let an analyst <strong style={{ color: "var(--text)", fontWeight: 600 }}>scan and compare many homogeneous sources</strong> — same four attributes each, looked at down a column. That is the textbook case for a table, and three forces settle it.</p>
          </div>
          <Card>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 22 }}>
              <div>
                <SubHead>Card grid — rejected</SubHead>
                <Preview label="Rejected" pad={16}><MiniCardGrid /></Preview>
              </div>
              <div>
                <SubHead>Table — chosen</SubHead>
                <Preview label="Chosen" pad={16}><MiniTable /></Preview>
              </div>
            </div>
            <Block>
              <SubHead>Why the table wins</SubHead>
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {[
                  ["Comparison down a column", "Analysts compare row counts and recency across sources. A shared right-aligned, tabular-numeral column makes magnitudes scan instantly; cards scatter the same number into a grid where the eye can't line them up."],
                  ["Grouping needs full-width bands", "#112 introduces pattern groups. A table renders a group header as a single colSpan row that members nest under — structurally clean. A card grid has to fake this with section wrappers that break the grid flow and re-flow awkwardly on resize."],
                  ["Density is the explicit goal", "The issue asks to improve density. A table row is ~38px; an equivalent card is ~96px and burns horizontal space on chrome. For an analyst with 30+ sources, the table shows 2–3× more per screen."],
                ].map(([t, b]) => (
                  <div key={t} style={{ display: "flex", gap: 11, alignItems: "flex-start" }}>
                    <Icon name="check" size={14} style={{ color: "var(--good)", marginTop: 3 }} />
                    <div style={{ fontSize: 13, color: "var(--text-2)", lineHeight: 1.6 }}><strong style={{ color: "var(--text)", fontWeight: 600 }}>{t}.</strong> {b}</div>
                  </div>
                ))}
              </div>
            </Block>
            <div style={{ fontSize: 12.5, color: "var(--text-3)", lineHeight: 1.6, paddingTop: 4, borderTop: "1px solid var(--border-soft)" }}>
              <strong style={{ color: "var(--text-2)" }}>Net:</strong> keep the <span className="mono" style={{ color: "var(--text)" }}>DataTable</span> foundation. The redesign is in the <em>row composition</em> and the <em>group bands</em> — not a new presentation paradigm.
            </div>
          </Card>
        </Section>

        {/* ITEM 2 — HIERARCHY */}
        <Section id="hierarchy">
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            <Eyebrow>Decision 2</Eyebrow>
            <h2 style={{ fontSize: 23, fontWeight: 600, letterSpacing: "-.01em" }}>Prominence hierarchy</h2>
            <p style={{ fontSize: 14, color: "var(--text-2)", maxWidth: 720, lineHeight: 1.6 }}>Three tiers, each pinned to a token. The redesign also <strong style={{ color: "var(--text)", fontWeight: 600 }}>removes the Method column</strong> — <span className="mono" style={{ color: "var(--text)" }}>ingestion_method</span> is registration config (already in the drawer's "Ingestion" row), not a scannable status. Cutting it tightens every row and sharpens the three tiers.</p>
          </div>
          <Card>
            <Preview label="Annotated" pad={24}><HierarchyDiagram /></Preview>
            <Block>
              <SubHead>The tiers</SubHead>
              <PropsTable rows={[
                ["Primary", "source name", "—", "SourceBadge + name at --text, weight 500, 13.5px. The column-count subline sits beneath at --text-3 mono. The identifier the analyst hunts for."],
                ["Secondary", "row count", "—", "Mono, tabular-nums, weight 500, right-aligned at --text (ingested) / --text-4 (not yet ingested → em-dash). The size/health signal — aligned so magnitudes compare down the column."],
                ["Tertiary", "ingested + status", "—", "Last-ingested date at --text-3; existing StatusPill (ingested → --good, registered → --text-3). Supporting context, never competes with the name or count."],
              ]} />
            </Block>
            <Block>
              <SubHead>Tokens used</SubHead>
              <TokenChips tokens={["--text", "--text-3", "--text-4", "--good", "--panel-3"]} />
              <div style={{ fontSize: 12.5, color: "var(--text-3)", lineHeight: 1.6, marginTop: 4 }}>Hierarchy is carried entirely by <em>weight, size, colour-tier and alignment</em> — no new colours. The em-dash for un-ingested counts uses <span className="mono">--text-4</span>, the same "absent value" treatment already in the table.</div>
            </Block>
          </Card>
        </Section>

        {/* ITEM 3 — GROUPHEADER */}
        <Section id="groupheader">
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            <Eyebrow>Decision 3 · a</Eyebrow>
            <h2 style={{ fontSize: 23, fontWeight: 600, letterSpacing: "-.01em" }}>GroupHeader — the new primitive</h2>
            <p style={{ fontSize: 14, color: "var(--text-2)", maxWidth: 720, lineHeight: 1.6 }}>From #112: a source whose <span className="mono" style={{ color: "var(--text)" }}>pattern</span> is non-null is a named report. In the list, sources sharing a pattern cluster under a full-span band showing the <strong style={{ color: "var(--text)", fontWeight: 600 }}>human-readable pattern</strong> (e.g. <span className="mono" style={{ color: "var(--text)" }}>sales_jan_*</span>), a source count, and the group's total rows. It's a <span className="mono" style={{ color: "var(--text)" }}>&lt;tr&gt;</span> so it lives inside the existing table — members nest beneath with a left indent.</p>
          </div>
          <Card>
            <Preview label="Live · collapsible" pad={20}>
              <div style={{ background: "var(--panel)", border: "1px solid var(--border)", borderRadius: "var(--radius)", overflow: "hidden" }}>
                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                  <tbody><GroupedSingle /></tbody>
                </table>
              </div>
            </Preview>
            <Block>
              <SubHead>Props</SubHead>
              <PropsTable rows={[
                ["name", "string", "—", "Human-readable pattern label, e.g. \"sales_jan_*\". The raw regex is never shown."],
                ["count", "number", "—", "Number of sources in the group → \"N sources\" chip."],
                ["rowCount", "number", "—", "Summed ingested rows across members → right-aligned aggregate."],
                ["colSpan", "number", "—", "Pass columns.length so the band spans the full table width."],
                ["collapsed", "bool", "false", "Hides member rows; rotates the chevron −90°. State owned by DataTable."],
                ["onToggle", "function", "—", "Fired by the chevron button to flip collapsed."],
              ]} />
            </Block>
            <Block>
              <SubHead>Tokens used</SubHead>
              <TokenChips tokens={["--panel-2", "--panel-3", "--border", "--border-soft", "--text-2", "--text-3"]} />
              <div style={{ fontSize: 12.5, color: "var(--text-3)", lineHeight: 1.6, marginTop: 4 }}>Band sits one step up from the row plane (<span className="mono">--panel-2</span>) with a <span className="mono">--border</span> top rule and <span className="mono">--border-soft</span> bottom — quieter than the table head, louder than a member row. The count chip reuses the exact <span className="mono">--panel-3 / --border</span> chip recipe from the codebase. The new <span className="mono">group</span> glyph is the only addition to the <span className="mono">ICONS</span> map.</div>
            </Block>
            <Block>
              <SubHead>Implementation</SubHead>
              <Code text={SNIPPETS.groupHeader} />
            </Block>
          </Card>
        </Section>

        {/* ITEM 3b — DATATABLE */}
        <Section id="datatable">
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            <Eyebrow>Decision 3 · b</Eyebrow>
            <h2 style={{ fontSize: 23, fontWeight: 600, letterSpacing: "-.01em" }}>DataTable gains a <span className="mono" style={{ fontSize: 19 }}>groups</span> prop</h2>
            <p style={{ fontSize: 14, color: "var(--text-2)", maxWidth: 720, lineHeight: 1.6 }}>Rather than fork a new list component, extend the shared <span className="mono" style={{ color: "var(--text)" }}>DataTable</span> with one optional prop. Omit it and behaviour is <strong style={{ color: "var(--text)", fontWeight: 600 }}>identical to today</strong> — Functions, Sets, Results screens need zero changes. Provide it and grouped bands render after the flat rows. Collapse state lives in <span className="mono" style={{ color: "var(--text)" }}>DataTable</span>.</p>
          </div>
          <Card>
            <Block>
              <SubHead>groups — shape</SubHead>
              <PropsTable rows={[
                ["groups", "Group[] | undefined", "undefined", "Optional. Omitted → unchanged. Each Group: { key, label, rows, rowCount }."],
                ["└ key", "string", "—", "Stable identity for collapse state + React keys (the pattern label)."],
                ["└ label", "string", "—", "Passed to GroupHeader name."],
                ["└ rows", "Row[]", "—", "Member rows, rendered with the same columns + indent."],
                ["└ rowCount", "number", "—", "Pre-summed aggregate for the band."],
              ]} />
            </Block>
            <Block>
              <SubHead>Implementation</SubHead>
              <Code text={SNIPPETS.dataTable} />
            </Block>
          </Card>
        </Section>

        {/* ITEM 4 — WIRING */}
        <Section id="wiring">
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            <Eyebrow>Decision 4</Eyebrow>
            <h2 style={{ fontSize: 23, fontWeight: 600, letterSpacing: "-.01em" }}>Wiring in screen-data.jsx</h2>
            <p style={{ fontSize: 14, color: "var(--text-2)", maxWidth: 720, lineHeight: 1.6 }}>Three edits in <span className="mono" style={{ color: "var(--text)" }}>ScreenData()</span>: drop the Method column, partition sources into flat + grouped by their pattern label, pass both to <span className="mono" style={{ color: "var(--text)" }}>DataTable</span>. Grouping is <strong style={{ color: "var(--text)", fontWeight: 600 }}>display-only</strong> — no schema or endpoint change; it reads the pattern field the source already carries.</p>
          </div>
          <Card>
            <Code text={SNIPPETS.screenData} file="screen-data.jsx" />
            <div style={{ fontSize: 12.5, color: "var(--text-3)", lineHeight: 1.6, paddingTop: 4, borderTop: "1px solid var(--border-soft)" }}>
              <strong style={{ color: "var(--text-2)" }}>Backend note for Code:</strong> the list partition keys on a human-readable pattern label. If <span className="mono" style={{ color: "var(--text)" }}>/sources</span> doesn't yet return one, derive it client-side from the source's <span className="mono" style={{ color: "var(--text)" }}>pattern</span> regex, or add a <span className="mono" style={{ color: "var(--text)" }}>pattern_label</span> field server-side — coordinate with #112. Sources with no pattern stay flat. No grouping → table renders exactly as the flat list does today.
            </div>
          </Card>
        </Section>

        {/* EXPORT */}
        <Section id="export">
          <Card>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              <SubHead>Export — GroupHeader joins the registry</SubHead>
              <Code text={SNIPPETS.exportReg} />
            </div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 10, fontSize: 12, color: "var(--text-3)" }}>
              {["Table foundation kept", "One new component", "One new glyph", "Zero new colours", "DataTable back-compatible", "No new dependencies"].map(t => (
                <span key={t} style={{ display: "inline-flex", alignItems: "center", gap: 6 }}><Icon name="check" size={13} style={{ color: "var(--good)" }} /> {t}</span>
              ))}
            </div>
          </Card>
        </Section>

        {/* ACCEPTANCE */}
        <Section id="acceptance">
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            <Eyebrow>Handoff</Eyebrow>
            <h2 style={{ fontSize: 23, fontWeight: 600, letterSpacing: "-.01em" }}>Acceptance criteria, mapped</h2>
          </div>
          <Card>
            <div style={{ display: "flex", flexDirection: "column", gap: 11 }}>
              {[
                ["Source list renders with the new layout", "Redesigned table: 3-tier rows, Method dropped, group bands. §The target."],
                ["All existing functionality preserved", "Row click → drawer, StatusPill, row count, last-ingested all retained. §The target."],
                ["#112 group headers visually integrated", "GroupHeader as a colSpan <tr>; collapsible; aggregate counts. §GroupHeader."],
                ["No new external dependencies", "Inline styles, existing tokens, one SVG glyph. §Constraints."],
              ].map(([t, b]) => (
                <div key={t} style={{ display: "flex", gap: 11, alignItems: "flex-start" }}>
                  <span style={{ width: 16, height: 16, borderRadius: 4, border: "1.5px solid var(--good)", display: "inline-flex", alignItems: "center", justifyContent: "center", marginTop: 2, flexShrink: 0 }}><Icon name="check" size={11} style={{ color: "var(--good)" }} /></span>
                  <div style={{ fontSize: 13, color: "var(--text-2)", lineHeight: 1.55 }}><strong style={{ color: "var(--text)", fontWeight: 600 }}>{t}.</strong> {b}</div>
                </div>
              ))}
            </div>
          </Card>
        </Section>

      </div>
    </div>
  );
}

/* small helper: the single-group live demo used in the GroupHeader section */
function GroupedSingle() {
  const [collapsed, setCollapsed] = useState(false);
  const g = GROUPS[0];
  return (
    <React.Fragment>
      <GroupHeader name={g.key} count={g.count} rowCount={g.rowCount} colSpan={5} collapsed={collapsed} onToggle={() => setCollapsed(c => !c)} />
      {!collapsed && g.rows.map(s => <SourceRow key={s.name} s={s} grouped />)}
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
