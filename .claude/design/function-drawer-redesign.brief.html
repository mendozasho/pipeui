<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PipeUI — Function Drawer Redesign · Design Brief</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e10; --panel: #141416; --panel-2: #1a1a1d; --panel-3: #202024;
    --border: rgba(255,255,255,0.08); --border-soft: rgba(255,255,255,0.04); --hover: rgba(255,255,255,0.06);
    --text: #f0f0f2; --text-2: #a0a0aa; --text-3: #6a6a74; --text-4: #3a3a42;
    --good: #34d399; --bad: #f87171; --warn: #fbbf24; --run: #60a5fa;
    --accent: #7c6cf5; --accent-soft: rgba(124,108,245,0.12); --accent-line: rgba(124,108,245,0.4); --accent-ink: #fff;
    --check: #60a5fa; --check-bg: rgba(96,165,250,0.1); --xform: #fbbf24; --xform-bg: rgba(251,191,36,0.1);
    --radius: 6px; --radius-lg: 10px;
    font-family: 'Geist', system-ui, sans-serif;
    font-size: 14px;
  }

  body { background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; line-height: 1.5; }

  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.16); }

  .mono { font-family: 'Geist Mono', ui-monospace, monospace; }

  body::before {
    content: ""; position: fixed; inset: 0 0 auto 0; height: 2px; z-index: 50;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: .5;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

/* ──────────────────────────────────────────────────────────────────────────
   PRIMITIVES — lifted verbatim from ui.jsx so the before/after renders the
   REAL components. Spinner is the Session-1 primitive (now on window.__UI__).
   ────────────────────────────────────────────────────────────────────────── */
const ICONS = {
  close:    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="m5 5 10 10M15 5 5 15"/></svg>,
  check:    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="2"><path d="m4 10 4.5 4.5L16 6"/></svg>,
  warn:     <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M10 3 2 17h16L10 3z"/><path d="M10 8v4M10 14v.5"/></svg>,
  file:     <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M5 3h7l4 4v10a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z"/><path d="M12 3v4h4"/></svg>,
  play:     <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.6"><path d="M6 4l10 6-10 6V4z" fill="currentColor" stroke="none"/></svg>,
};
function Icon({ name, size = 16, style }) {
  const svg = ICONS[name]; if (!svg) return null;
  return <span style={{ display: "inline-flex", alignItems: "center", width: size, height: size, flexShrink: 0, ...style }}>{React.cloneElement(svg, { width: size, height: size })}</span>;
}
function Btn({ children, variant = "default", size = "md", icon, onClick, disabled, style }) {
  const base = { display: "inline-flex", alignItems: "center", gap: 6, cursor: disabled ? "not-allowed" : "pointer", border: "1px solid", borderRadius: "var(--radius)", fontWeight: 500, transition: "opacity .15s", opacity: disabled ? 0.45 : 1, whiteSpace: "nowrap" };
  const sizes = { sm: { padding: "3px 10px", fontSize: 12 }, md: { padding: "6px 14px", fontSize: 13 }, lg: { padding: "9px 18px", fontSize: 14 } };
  const variants = { default: { background: "var(--panel-3)", borderColor: "var(--border)", color: "var(--text-2)" }, primary: { background: "var(--accent)", borderColor: "transparent", color: "var(--accent-ink)" }, ghost: { background: "transparent", borderColor: "transparent", color: "var(--text-2)" } };
  return <button type="button" style={{ ...base, ...sizes[size], ...variants[variant], ...style }} onClick={onClick} disabled={disabled}>{icon && <Icon name={icon} size={14} />}{children}</button>;
}
function KindTag({ kind }) {
  const isCheck = kind === "validation";
  return <span style={{ display: "inline-flex", alignItems: "center", gap: 4, padding: "2px 8px", borderRadius: 99, background: isCheck ? "var(--check-bg)" : "var(--xform-bg)", color: isCheck ? "var(--check)" : "var(--xform)", fontSize: 11, fontWeight: 600, letterSpacing: ".03em" }}>{kind}</span>;
}
/* StatusPill — SHOWN WITH THE PROPOSED active/inactive entries added */
function StatusPill({ status }) {
  const map = {
    registered: { color: "var(--text-3)", bg: "var(--panel-3)" },
    ingested:   { color: "var(--good)",   bg: "rgba(52,211,153,.1)" },
    error:      { color: "var(--bad)",    bg: "rgba(248,113,113,.1)" },
    running:    { color: "var(--run)",    bg: "rgba(96,165,250,.1)" },
    active:     { color: "var(--good)",   bg: "rgba(52,211,153,.1)" },   // NEW
    inactive:   { color: "var(--text-3)", bg: "var(--panel-3)" },        // NEW
  };
  const s = map[status] || map.registered;
  return <span style={{ display: "inline-block", padding: "2px 8px", borderRadius: 99, background: s.bg, color: s.color, fontSize: 11, fontWeight: 600, letterSpacing: ".03em" }}>{status}</span>;
}
function SourceBadge({ name, style }) {
  const initials = name.slice(0, 2).toUpperCase();
  const hue = [...name].reduce((h, c) => h + c.charCodeAt(0), 0) % 360;
  return <span style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: 28, height: 28, borderRadius: "var(--radius)", background: `hsl(${hue},50%,22%)`, color: `hsl(${hue},70%,70%)`, fontSize: 11, fontWeight: 700, flexShrink: 0, ...style }}>{initials}</span>;
}
function Spinner({ size = 14, color = "currentColor", strokeWidth = 2 }) {
  const c = size / 2, r = (size - strokeWidth) / 2, circ = 2 * Math.PI * r;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ flexShrink: 0, display: "block" }} role="status" aria-label="Loading">
      <circle cx={c} cy={c} r={r} fill="none" stroke={color} strokeOpacity={0.22} strokeWidth={strokeWidth} />
      <circle cx={c} cy={c} r={r} fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeDasharray={`${circ * 0.3} ${circ}`}>
        <animateTransform attributeName="transform" type="rotate" from={`0 ${c} ${c}`} to={`360 ${c} ${c}`} dur="0.7s" repeatCount="indefinite" />
      </circle>
    </svg>
  );
}

/* ──────────────────────────────────────────────────────────────────────────
   MOCK FUNCTION DETAIL — the payload /functions/{id} returns
   ────────────────────────────────────────────────────────────────────────── */
const FN = {
  function_name: "flag_negative_amount",
  function_signature: "(amount: pd.Series[float]) -> pd.Series[bool]",
  function_doc: "Flag rows where the transaction amount is negative.\nReturns a boolean mask aligned to the input index — True marks a failing row.",
  function_type: "validation",
  function_return_type: "pd.Series[bool]",
  function_class: "pd.Series",
  is_active: true,
  module_path: "/Users/user/work/checks/amounts.py",
  parameters: [
    { param_id: "p1", param_name: "amount", param_type: "pd.Series[float]" },
  ],
  attached_sources: [
    { source_id: "s1", source_name: "sales_jan_2026" },
    { source_id: "s2", source_name: "returns_q4" },
    { source_id: "s3", source_name: "crm_accounts" },
  ],
};

/* ──────────────────────────────────────────────────────────────────────────
   DOC CHROME
   ────────────────────────────────────────────────────────────────────────── */
function Eyebrow({ children, color = "var(--accent)" }) {
  return <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: ".14em", textTransform: "uppercase", color }}>{children}</div>;
}
function SubHead({ children }) {
  return <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: ".08em", textTransform: "uppercase", color: "var(--text-3)", marginBottom: 12 }}>{children}</div>;
}
function Card({ children, style }) {
  return <div style={{ background: "var(--panel)", border: "1px solid var(--border)", borderRadius: "var(--radius-lg)", padding: 24, display: "flex", flexDirection: "column", gap: 20, ...style }}>{children}</div>;
}
function Block({ children, style }) {
  return <div style={{ display: "flex", flexDirection: "column", gap: 12, ...style }}>{children}</div>;
}
function Section({ id, children }) {
  return <section id={id} style={{ display: "flex", flexDirection: "column", gap: 20, scrollMarginTop: 24 }}>{children}</section>;
}
function SectionHead({ kicker, title, children }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
      <Eyebrow>{kicker}</Eyebrow>
      <h2 style={{ fontSize: 23, fontWeight: 600, letterSpacing: "-.01em" }}>{title}</h2>
      {children && <p style={{ fontSize: 14, color: "var(--text-2)", maxWidth: 740, lineHeight: 1.6 }}>{children}</p>}
    </div>
  );
}
function M({ children }) { return <span className="mono" style={{ color: "var(--text)" }}>{children}</span>; }

function Code({ text, file = "ui.jsx" }) {
  const lines = String(text).replace(/^\n/, "").replace(/\s+$/, "").split("\n");
  return (
    <div style={{ background: "#0a0a0c", border: "1px solid var(--border)", borderRadius: "var(--radius)", overflow: "hidden" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 7, padding: "7px 12px", borderBottom: "1px solid var(--border-soft)", background: "var(--panel-2)" }}>
        <span style={{ width: 8, height: 8, borderRadius: 99, background: "var(--text-4)" }} />
        <span className="mono" style={{ fontSize: 11, color: "var(--text-3)" }}>{file}</span>
      </div>
      <pre className="mono" style={{ margin: 0, padding: "14px 16px", fontSize: 12.5, lineHeight: 1.65, overflowX: "auto", color: "var(--text-2)" }}>
        {lines.map((ln, i) => <div key={i} style={{ color: ln.trimStart().startsWith("//") ? "var(--text-4)" : "var(--text-2)", whiteSpace: "pre" }}>{ln || " "}</div>)}
      </pre>
    </div>
  );
}
function Diff({ rows }) {
  return (
    <div style={{ border: "1px solid var(--border)", borderRadius: "var(--radius)", overflow: "hidden", background: "#0a0a0c" }}>
      {rows.map(([sign, ln], i) => {
        const bg = sign === "-" ? "rgba(248,113,113,.06)" : sign === "+" ? "rgba(52,211,153,.06)" : "transparent";
        const mk = sign === "-" ? "var(--bad)" : sign === "+" ? "var(--good)" : "var(--text-4)";
        return (
          <div key={i} className="mono" style={{ display: "flex", fontSize: 12, lineHeight: 1.6, background: bg }}>
            <span style={{ width: 22, textAlign: "center", color: mk, flexShrink: 0, userSelect: "none", opacity: .8 }}>{sign === " " ? "" : sign}</span>
            <span style={{ color: ln.trimStart().startsWith("//") ? "var(--text-4)" : "var(--text-2)", whiteSpace: "pre-wrap", paddingRight: 12 }}>{ln}</span>
          </div>
        );
      })}
    </div>
  );
}
function PropsTable({ head = ["Prop", "Type", "Default", "Notes"], rows }) {
  return (
    <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
      <thead><tr>{head.map(h => <th key={h} style={{ padding: "7px 12px", textAlign: "left", color: "var(--text-3)", fontWeight: 500, fontSize: 10.5, letterSpacing: ".06em", textTransform: "uppercase", borderBottom: "1px solid var(--border)", whiteSpace: "nowrap" }}>{h}</th>)}</tr></thead>
      <tbody>
        {rows.map((r, i) => (
          <tr key={i} style={{ borderBottom: "1px solid var(--border-soft)" }}>
            {r.map((cell, j) => <td key={j} className={j < 3 ? "mono" : ""} style={{ padding: "8px 12px", fontSize: j < 3 ? 12.5 : 13, color: j === 0 ? "var(--accent)" : j === 1 ? "var(--good)" : j === 2 ? "var(--text-3)" : "var(--text-2)", whiteSpace: j === 3 ? "normal" : "nowrap", verticalAlign: "top" }}>{cell}</td>)}
          </tr>
        ))}
      </tbody>
    </table>
  );
}
function TokenChip({ t, note }) {
  return (
    <span className="mono" style={{ display: "inline-flex", alignItems: "center", gap: 7, padding: "3px 10px", borderRadius: 99, background: "var(--panel-3)", border: "1px solid var(--border)", fontSize: 11, color: "var(--text-2)" }}>
      <span style={{ width: 10, height: 10, borderRadius: 3, background: `var(${t})`, border: "1px solid rgba(255,255,255,.14)" }} />{t}{note && <span style={{ color: "var(--text-4)" }}>· {note}</span>}
    </span>
  );
}

/* ──────────────────────────────────────────────────────────────────────────
   DRAWER SHELL (mock of ui.jsx <Drawer>) — used for both before & after
   ────────────────────────────────────────────────────────────────────────── */
function DrawerShell({ title, children, footer, label }) {
  return (
    <div style={{ position: "relative", width: 440, flexShrink: 0, background: "var(--panel)", border: "1px solid var(--border)", borderRadius: "var(--radius-lg)", overflow: "hidden", display: "flex", flexDirection: "column", height: 620 }}>
      <span className="mono" style={{ position: "absolute", top: 10, right: 12, fontSize: 9, letterSpacing: ".12em", textTransform: "uppercase", color: "var(--text-4)", zIndex: 2 }}>{label}</span>
      {/* drawer header (Drawer primitive) */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "16px 20px", borderBottom: "1px solid var(--border)", flexShrink: 0 }}>
        <span className="mono" style={{ fontWeight: 600, fontSize: 15, color: "var(--text)" }}>{title}</span>
        <span style={{ color: "var(--text-3)", display: "inline-flex" }}><Icon name="close" size={16} /></span>
      </div>
      <div style={{ flex: 1, overflowY: "auto", padding: 20 }}>{children}</div>
      {footer && (
        <div style={{ flexShrink: 0, borderTop: "1px solid var(--border)", background: "var(--panel-2)", padding: "12px 20px", display: "flex", alignItems: "center", gap: 12 }}>{footer}</div>
      )}
    </div>
  );
}

function FnSectionHead({ children }) {
  return <div style={{ fontSize: 11, color: "var(--text-3)", fontWeight: 600, letterSpacing: ".05em", textTransform: "uppercase", marginBottom: 10 }}>{children}</div>;
}
function KV({ label, children }) {
  return (
    <div style={{ display: "flex", justifyContent: "space-between", gap: 16, padding: "5px 0", borderBottom: "1px solid var(--border-soft)", fontSize: 13 }}>
      <span style={{ color: "var(--text-3)" }}>{label}</span>
      <span style={{ color: "var(--text)", fontWeight: 500, textAlign: "right" }}>{children}</span>
    </div>
  );
}
function SignatureBlock() {
  return (
    <div className="mono" style={{ fontSize: 12, background: "var(--panel-2)", border: "1px solid var(--border)", borderRadius: "var(--radius)", padding: "10px 14px", color: "var(--text)", wordBreak: "break-word", lineHeight: 1.5 }}>
      {FN.function_name}{FN.function_signature}
    </div>
  );
}
function ParamTable() {
  return (
    <div style={{ borderRadius: "var(--radius)", border: "1px solid var(--border)", overflow: "hidden" }}>
      <table className="mono" style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
        <thead><tr style={{ background: "var(--panel-2)" }}>
          <th style={{ padding: "6px 12px", textAlign: "left", fontWeight: 600, color: "var(--text-2)", borderBottom: "1px solid var(--border)" }}>param_name</th>
          <th style={{ padding: "6px 12px", textAlign: "left", fontWeight: 600, color: "var(--text-2)", borderBottom: "1px solid var(--border)" }}>param_type</th>
        </tr></thead>
        <tbody>{FN.parameters.map((p, i) => (
          <tr key={p.param_id} style={{ background: i % 2 === 0 ? "transparent" : "var(--panel-2)" }}>
            <td style={{ padding: "5px 12px", borderBottom: "1px solid var(--border-soft)", color: "var(--text)" }}>{p.param_name}</td>
            <td style={{ padding: "5px 12px", borderBottom: "1px solid var(--border-soft)", color: "var(--text-3)" }}>{p.param_type}</td>
          </tr>
        ))}</tbody>
      </table>
    </div>
  );
}

/* ── BEFORE — current FunctionDrawer, faithfully reproduced ── */
function BeforeDrawer() {
  const [running, setRunning] = useState(false);
  return (
    <DrawerShell title={FN.function_name} label="before · current">
      <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
        {/* header row: badge + status + raw run button (off-palette) */}
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <KindTag kind={FN.function_type} />
          <span style={{ fontSize: 11, fontWeight: 600, padding: "2px 8px", borderRadius: 99, background: "rgba(0,200,100,.12)", color: "#00c864", border: "1px solid #00c864" }}>active</span>
          <button onClick={() => { setRunning(true); setTimeout(() => setRunning(false), 1500); }} disabled={running} style={{ marginLeft: "auto", padding: "5px 16px", fontSize: 12, fontWeight: 600, background: running ? "var(--panel-3)" : "var(--run)", color: running ? "var(--text-3)" : "#fff", border: "none", borderRadius: "var(--radius)", cursor: running ? "default" : "pointer" }}>{running ? "Running…" : "Run"}</button>
        </div>
        <div><FnSectionHead>Signature</FnSectionHead><SignatureBlock /></div>
        <div><FnSectionHead>Documentation</FnSectionHead><div style={{ fontSize: 13, color: "var(--text-2)", lineHeight: 1.6, whiteSpace: "pre-wrap" }}>{FN.function_doc}</div></div>
        <div><FnSectionHead>Parameters (1)</FnSectionHead><ParamTable /></div>
        <div>
          <FnSectionHead>Details</FnSectionHead>
          <KV label="Return type">{FN.function_return_type}</KV>
          <KV label="Function type">{FN.function_type}</KV>
          <KV label="Function class">{FN.function_class}</KV>
          <KV label="Source file"><span className="mono" style={{ fontSize: 12, wordBreak: "break-all" }}>{FN.module_path}</span></KV>
        </div>
        <div>
          <FnSectionHead>Attached to</FnSectionHead>
          {FN.attached_sources.map(s => (
            <div key={s.source_id} style={{ padding: "6px 0", borderBottom: "1px solid var(--border-soft)", fontSize: 13, color: "var(--text)" }}>{s.source_name}</div>
          ))}
        </div>
      </div>
    </DrawerShell>
  );
}

/* ── AFTER — the proposed redesign ── */
function IdentityBlock({ active = true, running, onRun }) {
  return (
    <div style={{ background: "var(--panel-2)", border: "1px solid var(--border)", borderRadius: "var(--radius)", padding: "14px 16px", display: "flex", flexDirection: "column", gap: 12 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
        <KindTag kind={FN.function_type} />
        <StatusPill status={active ? "active" : "inactive"} />
        <span className="mono" style={{ fontSize: 11, color: "var(--text-4)", marginLeft: "auto" }}>{FN.function_class}</span>
      </div>
      <div style={{ height: 1, background: "var(--border-soft)" }} />
      {active ? (
        <Btn variant="primary" size="md" onClick={onRun} disabled={running} style={{ alignSelf: "flex-start", minWidth: 104, justifyContent: "center" }}>
          {running ? <><Spinner size={13} color="var(--accent-ink)" /> Running…</> : <><Icon name="play" size={12} /> Run</>}
        </Btn>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
          <Btn variant="primary" size="md" disabled style={{ alignSelf: "flex-start", minWidth: 104, justifyContent: "center" }}><Icon name="play" size={12} /> Run</Btn>
          <span style={{ fontSize: 11.5, color: "var(--text-3)" }}>Inactive — source file missing on disk. Rescan to restore.</span>
        </div>
      )}
    </div>
  );
}
function AttachedRow({ name }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 11, padding: "8px 0", borderBottom: "1px solid var(--border-soft)" }}>
      <SourceBadge name={name} style={{ width: 24, height: 24, fontSize: 10 }} />
      <span style={{ fontSize: 13, color: "var(--text)", fontWeight: 500 }}>{name}</span>
      <Icon name="file" size={13} style={{ color: "var(--text-4)", marginLeft: "auto" }} />
    </div>
  );
}
function AfterDrawer() {
  const [running, setRunning] = useState(false);
  return (
    <DrawerShell title={FN.function_name} label="after · proposed">
      <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
        <IdentityBlock active running={running} onRun={() => { setRunning(true); setTimeout(() => setRunning(false), 1600); }} />
        <div><FnSectionHead>Signature</FnSectionHead><SignatureBlock /></div>
        <div><FnSectionHead>Documentation</FnSectionHead><div style={{ fontSize: 13, color: "var(--text-2)", lineHeight: 1.6, whiteSpace: "pre-wrap" }}>{FN.function_doc}</div></div>
        <div><FnSectionHead>Parameters (1)</FnSectionHead><ParamTable /></div>
        <div>
          <FnSectionHead>Details</FnSectionHead>
          <KV label="Return type"><span className="mono" style={{ fontSize: 12.5 }}>{FN.function_return_type}</span></KV>
          <KV label="Function type"><span className="mono" style={{ fontSize: 12.5 }}>{FN.function_type}</span></KV>
          <KV label="Function class"><span className="mono" style={{ fontSize: 12.5 }}>{FN.function_class}</span></KV>
          <KV label="Source file"><span className="mono" style={{ fontSize: 12, wordBreak: "break-all" }}>{FN.module_path}</span></KV>
        </div>
        <div>
          <FnSectionHead>Attached to ({FN.attached_sources.length})</FnSectionHead>
          {FN.attached_sources.map(s => <AttachedRow key={s.source_id} name={s.source_name} />)}
        </div>
      </div>
    </DrawerShell>
  );
}

/* annotated callout dot */
function Note({ n, children }) {
  return (
    <div style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>

function RunStates() {
  const [running, setRunning] = useState(false);
  const cell = (label, node) => (
    <div style={{ display: "flex", flexDirection: "column", gap: 10, alignItems: "center" }}>
      {node}
      <span className="mono" style={{ fontSize: 10.5, color: "var(--text-4)" }}>{label}</span>
    </div>
  );
  return (
    <div style={{ display: "flex", flexWrap: "wrap", gap: 30, alignItems: "flex-start" }}>
      {cell("default", <Btn variant="primary" size="md" style={{ minWidth: 104, justifyContent: "center" }} onClick={() => { setRunning(true); setTimeout(() => setRunning(false), 1500); }}><Icon name="play" size={12} /> Run</Btn>)}
      {cell("running", <Btn variant="primary" size="md" disabled style={{ minWidth: 104, justifyContent: "center" }}><Spinner size={13} color="var(--accent-ink)" /> Running…</Btn>)}
      {cell("inactive · disabled", <Btn variant="primary" size="md" disabled style={{ minWidth: 104, justifyContent: "center" }}><Icon name="play" size={12} /> Run</Btn>)}
      <div style={{ width: 1, alignSelf: "stretch", background: "var(--border)" }} />
      {cell("live — click it", <Btn variant="primary" size="md" disabled={running} style={{ minWidth: 104, justifyContent: "center" }} onClick={() => { setRunning(true); setTimeout(() => setRunning(false), 1600); }}>{running ? <><Spinner size={13} color="var(--accent-ink)" /> Running…</> : <><Icon name="play" size={12} /> Run</>}</Btn>)}
    </div>
  );
}

                ]} file="screen-modules.jsx" />
                <div style={{ fontSize: 12, color: "var(--text-3)", lineHeight: 1.6 }}>
                  The <M>active</M> pill is intentionally the same chip as <M>ingested</M> — both mean "healthy / present", so the green reads consistently across screens. <M>inactive</M> matches <M>registered</M> (neutral grey).
                </div>
              </Block>
            </div>
          </Card>
        </Section>

        {/* ── ACCEPTANCE ── */}
        <Section id="acceptance">
          <SectionHead kicker="Handoff" title="Acceptance criteria" />
          <Card>
            <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
              {[
                "Drawer layout matches this spec: identity block first, then Signature, Documentation, Parameters, Details, Attached to.",
                "Run uses Btn variant=\"primary\" (--accent / --accent-ink), size md, left-aligned in the identity block. No --run, no raw <button>.",
                "Running state shows the Spinner + \"Running…\"; inactive shows a disabled Run + reason caption.",
                "active/inactive renders via StatusPill (active/inactive). The #00c864 / rgba(0,200,100,.12) hardcodes are gone.",
                "Attached sources render as SourceBadge + name rows with a count in the header; empty state unchanged.",
                "All existing functionality preserved (signature, doc, params, details, attached sources, active/inactive, run).",
                "ui.jsx change limited to the two StatusPill map entries. No new external dependencies.",
              ].map((t, i) => (
                <div key={i} style={{ display: "flex", gap: 11, alignItems: "flex-start", padding: "11px 0", borderTop: i ? "1px solid var(--border-soft)" : "none" }}>
                  <span style={{ flexShrink: 0, width: 18, height: 18, marginTop: 1, borderRadius: 5, border: "1px solid var(--border)", display: "inline-flex", alignItems: "center", justifyContent: "center" }}>
                    <Icon name="check" size={11} style={{ color: "var(--text-4)" }} />
                  </span>
                  <span style={{ fontSize: 13.5, color: "var(--text-2)", lineHeight: 1.5 }}>{t}</span>
                </div>
              ))}
            </div>
          </Card>

          <div style={{ display: "flex", gap: 12, alignItems: "flex-start", padding: "14px 16px", background: "var(--panel)", border: "1px solid var(--border)", borderRadius: "var(--radius)", fontSize: 12.5, color: "var(--text-2)", lineHeight: 1.6 }}>
            <Icon name="file" size={14} style={{ color: "var(--text-3)", marginTop: 1 }} />
            <div>
              <strong style={{ color: "var(--text)", fontWeight: 600 }}>To unblock #116:</strong> paste this brief's decisions below the line in the issue, remove the "Blocked on Design brief" notice, and re-label <M>ready-for-agent</M>. Scope is the <M>FunctionDrawer</M> in <M>screen-modules.jsx</M> plus the two-line <M>StatusPill</M> extension in <M>ui.jsx</M>.
            </div>
          </div>
        </Section>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
