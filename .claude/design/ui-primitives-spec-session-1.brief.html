<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PipeUI — UI Primitives Spec · Session 1</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e10; --panel: #141416; --panel-2: #1a1a1d; --panel-3: #202024;
    --border: rgba(255,255,255,0.08); --border-soft: rgba(255,255,255,0.04); --hover: rgba(255,255,255,0.06);
    --text: #f0f0f2; --text-2: #a0a0aa; --text-3: #6a6a74; --text-4: #3a3a42;
    --good: #34d399; --bad: #f87171; --warn: #fbbf24; --run: #60a5fa;
    --accent: #7c6cf5; --accent-soft: rgba(124,108,245,0.12); --accent-line: rgba(124,108,245,0.4); --accent-ink: #fff;
    --check: #60a5fa; --check-bg: rgba(96,165,250,0.1); --xform: #fbbf24; --xform-bg: rgba(251,191,36,0.1);
    --radius: 6px; --radius-lg: 10px;
    font-family: 'Geist', system-ui, sans-serif;
    font-size: 14px;
  }

  body { background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; line-height: 1.5; }

  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.16); }

  .mono { font-family: 'Geist Mono', ui-monospace, monospace; }

  /* top scanline accent */
  body::before {
    content: ""; position: fixed; inset: 0 0 auto 0; height: 2px; z-index: 50;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: .5;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

/* ──────────────────────────────────────────────────────────────────────────
   Existing PipeUI primitives (subset, lifted verbatim from ui.jsx for context)
   ────────────────────────────────────────────────────────────────────────── */
const ICONS = {
  warn:  <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M10 3 2 17h16L10 3z"/><path d="M10 8v4M10 14v.5"/></svg>,
  close: <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="m5 5 10 10M15 5 5 15"/></svg>,
  check: <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="2"><path d="m4 10 4.5 4.5L16 6"/></svg>,
  data:  <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.5"><ellipse cx="10" cy="5" rx="7" ry="2.5"/><path d="M3 5v5c0 1.38 3.13 2.5 7 2.5s7-1.12 7-2.5V5"/><path d="M3 10v5c0 1.38 3.13 2.5 7 2.5s7-1.12 7-2.5v-5"/></svg>,
};
function Icon({ name, size = 16, style }) {
  const svg = ICONS[name]; if (!svg) return null;
  return <span style={{ display: "inline-flex", alignItems: "center", width: size, height: size, flexShrink: 0, ...style }}>{React.cloneElement(svg, { width: size, height: size })}</span>;
}
function Btn({ children, variant = "default", size = "md", onClick, disabled, style }) {
  const base = { display: "inline-flex", alignItems: "center", gap: 6, cursor: disabled ? "not-allowed" : "pointer", border: "1px solid", borderRadius: "var(--radius)", fontWeight: 500, transition: "opacity .15s", opacity: disabled ? 0.55 : 1, whiteSpace: "nowrap" };
  const sizes = { sm: { padding: "3px 10px", fontSize: 12 }, md: { padding: "6px 14px", fontSize: 13 }, lg: { padding: "9px 18px", fontSize: 14 } };
  const variants = { default: { background: "var(--panel-3)", borderColor: "var(--border)", color: "var(--text-2)" }, primary: { background: "var(--accent)", borderColor: "transparent", color: "var(--accent-ink)" }, ghost: { background: "transparent", borderColor: "transparent", color: "var(--text-2)" } };
  return <button type="button" style={{ ...base, ...sizes[size], ...variants[variant], ...style }} onClick={onClick} disabled={disabled}>{children}</button>;
}

/* ──────────────────────────────────────────────────────────────────────────
   NEW · Item 1 — Spinner
   Pure-SVG animation via <animateTransform>. No @keyframes, no stylesheet,
   no external lib. Inherits colour through the `color` prop (default
   currentColor) so it adopts the surrounding context — e.g. a Btn's text.
   ────────────────────────────────────────────────────────────────────────── */
function Spinner({ size = 14, color = "currentColor", strokeWidth = 2 }) {
  const c = size / 2;
  const r = (size - strokeWidth) / 2;
  const circ = 2 * Math.PI * r;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ flexShrink: 0, display: "block" }} role="status" aria-label="Loading">
      <circle cx={c} cy={c} r={r} fill="none" stroke={color} strokeOpacity={0.22} strokeWidth={strokeWidth} />
      <circle cx={c} cy={c} r={r} fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeDasharray={`${circ * 0.3} ${circ}`}>
        <animateTransform attributeName="transform" type="rotate" from={`0 ${c} ${c}`} to={`360 ${c} ${c}`} dur="0.7s" repeatCount="indefinite" />
      </circle>
    </svg>
  );
}

/* NEW · Item 1 — LoadingState
   Full panel/section placeholder. Mirrors the DataTable empty-state treatment
   (centred, muted) so a fetching list and an empty list read as siblings. */
function LoadingState({ label = "Loading…", size = 22 }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 10, padding: "40px 20px", color: "var(--text-3)" }}>
      <Spinner size={size} color="var(--text-3)" strokeWidth={2.5} />
      <span style={{ fontSize: 12, letterSpacing: ".02em" }}>{label}</span>
    </div>
  );
}

/* ──────────────────────────────────────────────────────────────────────────
   NEW · Item 2 — InlineError
   Anchored, persistent error tied to a field / panel / failed action.
   variant="field" (default): tight icon+text, no chrome — sits under an input.
   variant="panel": tinted block with border — for drawer sections / actions.
   Auto-clears when `children` is falsy; optional onDismiss for manual close.
   ────────────────────────────────────────────────────────────────────────── */
function InlineError({ children, variant = "field", onDismiss, style }) {
  if (!children) return null;
  const isPanel = variant === "panel";
  return (
    <div role="alert" style={{
      display: "flex", alignItems: "flex-start", gap: 7,
      color: "var(--bad)", fontSize: 12, lineHeight: 1.45,
      ...(isPanel ? { padding: "8px 11px", background: "rgba(248,113,113,.1)", border: "1px solid rgba(248,113,113,.35)", borderRadius: "var(--radius)" } : { padding: "5px 0 0" }),
      ...style,
    }}>
      <Icon name="warn" size={13} style={{ marginTop: 1, opacity: .95 }} />
      <span style={{ flex: 1 }}>{children}</span>
      {onDismiss && <button onClick={onDismiss} aria-label="Dismiss" style={{ background: "none", border: "none", cursor: "pointer", color: "inherit", lineHeight: 1, opacity: .65, padding: 0, marginTop: 1 }}><Icon name="close" size={11} /></button>}
    </div>
  );
}

/* ──────────────────────────────────────────────────────────────────────────
   SNIPPETS — kept as plain strings (outside JSX) so the embedded JSX/HTML in
   each code sample is never re-parsed by Babel.
   ────────────────────────────────────────────────────────────────────────── */
const SNIPPETS = {
  spinner:
`// Pure SVG — no @keyframes, no stylesheet, no external lib.
function Spinner({ size = 14, color = "currentColor", strokeWidth = 2 }) {
  const c = size / 2;
  const r = (size - strokeWidth) / 2;
  const circ = 2 * Math.PI * r;
  return (
    <svg width={size} height={size} viewBox={\`0 0 \${size} \${size}\`}
         role="status" aria-label="Loading"
         style={{ flexShrink: 0, display: "block" }}>
      <circle cx={c} cy={c} r={r} fill="none" stroke={color}
              strokeOpacity={0.22} strokeWidth={strokeWidth} />
      <circle cx={c} cy={c} r={r} fill="none" stroke={color}
              strokeWidth={strokeWidth} strokeLinecap="round"
              strokeDasharray={\`\${circ * 0.3} \${circ}\`}>
        <animateTransform attributeName="transform" type="rotate"
          from={\`0 \${c} \${c}\`} to={\`360 \${c} \${c}\`}
          dur="0.7s" repeatCount="indefinite" />
      </circle>
    </svg>
  );
}

// Usage — inherits the button's ink:
<Btn variant="primary" disabled={saving}>
  {saving ? <><Spinner size={13} color="var(--accent-ink)" /> Ingesting…</> : "Run ingestion"}
</Btn>`,

  loadingState:
`function LoadingState({ label = "Loading…", size = 22 }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center",
                  justifyContent: "center", gap: 10, padding: "40px 20px",
                  color: "var(--text-3)" }}>
      <Spinner size={size} color="var(--text-3)" strokeWidth={2.5} />
      <span style={{ fontSize: 12, letterSpacing: ".02em" }}>{label}</span>
    </div>
  );
}

// Replaces, e.g. in screen-modules.jsx:
//   {loading && <div style={{...}}>Loading functions…</div>}
{loading ? <LoadingState label="Loading functions…" /> : <DataTable .../>}`,

  inlineError:
`function InlineError({ children, variant = "field", onDismiss, style }) {
  if (!children) return null;                    // falsy message → auto-clear
  const isPanel = variant === "panel";
  return (
    <div role="alert" style={{
      display: "flex", alignItems: "flex-start", gap: 7,
      color: "var(--bad)", fontSize: 12, lineHeight: 1.45,
      ...(isPanel
        ? { padding: "8px 11px", background: "rgba(248,113,113,.1)",
            border: "1px solid rgba(248,113,113,.35)", borderRadius: "var(--radius)" }
        : { padding: "5px 0 0" }),
      ...style,
    }}>
      <Icon name="warn" size={13} style={{ marginTop: 1 }} />
      <span style={{ flex: 1 }}>{children}</span>
      {onDismiss && (
        <button onClick={onDismiss} aria-label="Dismiss"
          style={{ background: "none", border: "none", cursor: "pointer",
                   color: "inherit", padding: 0, marginTop: 1, opacity: .65 }}>
          <Icon name="close" size={11} />
        </button>
      )}
    </div>
  );
}

// Field — clears itself when the value becomes valid:
<InlineError>{nameInvalid ? "Lowercase, digits, underscores only." : null}</InlineError>

// Panel — replaces the console.error-only migration path:
<InlineError variant="panel" onDismiss={clearErr}>
  Migration failed: 3 rows could not be cast. The source is unchanged.
</InlineError>`,

  exportReg:
`// end of ui.jsx
window.__UI__ = {
  Icon, Btn, KindTag, StatusPill, SourceBadge, DataTable, Flash, Drawer,
  Spinner, LoadingState, InlineError,   // ← added this session
};`,
};

/* ──────────────────────────────────────────────────────────────────────────
   DOC CHROME
   ────────────────────────────────────────────────────────────────────────── */
function Eyebrow({ children }) {
  return <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: ".14em", textTransform: "uppercase", color: "var(--accent)" }}>{children}</div>;
}

function Code({ text }) {
  const lines = String(text).replace(/^\n/, "").replace(/\s+$/, "").split("\n");
  return (
    <div style={{ background: "#0a0a0c", border: "1px solid var(--border)", borderRadius: "var(--radius)", overflow: "hidden" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 7, padding: "7px 12px", borderBottom: "1px solid var(--border-soft)", background: "var(--panel-2)" }}>
        <span style={{ width: 8, height: 8, borderRadius: 99, background: "var(--text-4)" }} />
        <span className="mono" style={{ fontSize: 11, color: "var(--text-3)" }}>ui.jsx</span>
      </div>
      <pre className="mono" style={{ margin: 0, padding: "14px 16px", fontSize: 12.5, lineHeight: 1.65, overflowX: "auto", color: "var(--text-2)" }}>
        {lines.map((ln, i) => {
          const isComment = ln.trimStart().startsWith("//");
          return <div key={i} style={{ color: isComment ? "var(--text-4)" : "var(--text-2)", whiteSpace: "pre" }}>{ln || " "}</div>;
        })}
      </pre>
    </div>
  );
}

function Preview({ children, label = "Preview", pad = 28, bg = "var(--panel-2)" }) {
  return (
    <div style={{ position: "relative", background: bg, border: "1px solid var(--border)", borderRadius: "var(--radius-lg)", padding: pad, backgroundImage: "radial-gradient(rgba(255,255,255,0.022) 1px, transparent 0)", backgroundSize: "16px 16px" }}>
      <span className="mono" style={{ position: "absolute", top: 10, right: 12, fontSize: 9.5, letterSpacing: ".12em", textTransform: "uppercase", color: "var(--text-4)" }}>{label}</span>
      {children}
    </div>
  );
}

function PropsTable({ rows }) {
  return (
    <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
      <thead>
        <tr>
          {["Prop", "Type", "Default", "Notes"].map(h => (
            <th key={h} style={{ padding: "7px 12px", textAlign: "left", color: "var(--text-3)", fontWeight: 500, fontSize: 10.5, letterSpacing: ".06em", textTransform: "uppercase", borderBottom: "1px solid var(--border)", whiteSpace: "nowrap" }}>{h}</th>
          ))}
        </tr>
      </thead>
      <tbody>
        {rows.map((r, i) => (
          <tr key={i} style={{ borderBottom: "1px solid var(--border-soft)" }}>
            <td className="mono" style={{ padding: "8px 12px", color: "var(--accent)", fontSize: 12.5, whiteSpace: "nowrap", verticalAlign: "top" }}>{r[0]}</td>
            <td className="mono" style={{ padding: "8px 12px", color: "var(--good)", fontSize: 12, verticalAlign: "top" }}>{r[1]}</td>
            <td className="mono" style={{ padding: "8px 12px", color: "var(--text-3)", fontSize: 12, whiteSpace: "nowrap", verticalAlign: "top" }}>{r[2]}</td>
            <td style={{ padding: "8px 12px", color: "var(--text-2)", verticalAlign: "top" }}>{r[3]}</td>
          </tr>
        ))}
      </tbody>
    </table>
  );
}

function TokenChips({ tokens }) {
  return (
    <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
      {tokens.map(t => (
        <span key={t} className="mono" style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "3px 9px", borderRadius: 99, background: "var(--panel-3)", border: "1px solid var(--border)", fontSize: 11, color: "var(--text-2)" }}>
          <span style={{ width: 9, height: 9, borderRadius: 3, background: `var(${t})`, border: "1px solid rgba(255,255,255,.12)" }} />{t}
        </span>
      ))}
    </div>
  );
}

function SubHead({ children }) {
  return <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: ".08em", textTransform: "uppercase", color: "var(--text-3)", marginBottom: 12 }}>{children}</div>;
}

function Block({ children, style }) {
  return <div style={{ display: "flex", flexDirection: "column", gap: 12, ...style }}>{children}</div>;
}

/* A self-contained little harness that fakes a fetch so the demos feel real */
function ReplayButton({ onReplay, children }) {
  return <button onClick={onReplay} style={{ background: "none", border: "1px solid var(--border)", color: "var(--text-3)", borderRadius: 99, padding: "3px 11px", fontSize: 11, cursor: "pointer", display: "inline-flex", alignItems: "center", gap: 5 }}>↻ {children}</button>;
}

/* ──────────────────────────────────────────────────────────────────────────
   LIVE DEMOS
   ────────────────────────────────────────────────────────────────────────── */
function SpinnerDemo() {
  const [saving, setSaving] = useState(false);
  const save = () => { setSaving(true); setTimeout(() => setSaving(false), 1900); };
  return (
    <div style={{ display: "flex", flexWrap: "wrap", gap: 36, alignItems: "center" }}>
      <div style={{ display: "flex", flexDirection: "column", gap: 10, alignItems: "center" }}>
        <div style={{ display: "flex", gap: 18, alignItems: "flex-end" }}>
          <Spinner size={12} color="var(--text-2)" />
          <Spinner size={16} color="var(--text-2)" />
          <Spinner size={22} color="var(--accent)" strokeWidth={2.5} />
          <Spinner size={32} color="var(--run)" strokeWidth={3} />
        </div>
        <span className="mono" style={{ fontSize: 10.5, color: "var(--text-4)" }}>12 · 16 · 22 · 32</span>
      </div>

      <div style={{ width: 1, alignSelf: "stretch", background: "var(--border)" }} />

      <div style={{ display: "flex", flexDirection: "column", gap: 10, alignItems: "center" }}>
        <Btn variant="primary" size="md" onClick={save} disabled={saving} style={{ minWidth: 132, justifyContent: "center" }}>
          {saving ? <><Spinner size={13} color="var(--accent-ink)" /> Ingesting…</> : "Run ingestion"}
        </Btn>
        <span className="mono" style={{ fontSize: 10.5, color: "var(--text-4)" }}>inside &lt;Btn&gt; · inherits ink</span>
      </div>

      <div style={{ width: 1, alignSelf: "stretch", background: "var(--border)" }} />

      <div style={{ display: "flex", flexDirection: "column", gap: 10, alignItems: "center" }}>
        <span style={{ display: "inline-flex", alignItems: "center", gap: 8, fontSize: 13, color: "var(--text-2)" }}>
          <Spinner size={13} color="var(--text-3)" /> Rescanning functions…
        </span>
        <span className="mono" style={{ fontSize: 10.5, color: "var(--text-4)" }}>beside a label</span>
      </div>
    </div>
  );
}

function LoadingStateDemo() {
  const [phase, setPhase] = useState("loading"); // loading | loaded
  const replay = () => { setPhase("loading"); setTimeout(() => setPhase("loaded"), 2200); };
  useEffect(() => { const t = setTimeout(() => setPhase("loaded"), 2200); return () => clearTimeout(t); }, []);
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
      <div style={{ background: "var(--panel)", border: "1px solid var(--border)", borderRadius: "var(--radius)", overflow: "hidden", minHeight: 168, display: "flex", flexDirection: "column" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "10px 14px", borderBottom: "1px solid var(--border-soft)" }}>
          <Icon name="data" size={15} style={{ color: "var(--text-3)" }} />
          <span style={{ fontSize: 12.5, color: "var(--text-2)", fontWeight: 500 }}>Sources</span>
        </div>
        <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center" }}>
          {phase === "loading"
            ? <LoadingState label="Loading sources…" />
            : (
              <div style={{ padding: "6px 0" }}>
                {[["sales_jan_2026", "ingested"], ["crm_accounts", "ingested"], ["returns_q4", "registered"]].map((r, i) => (
                  <div key={i} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "9px 14px", borderBottom: i < 2 ? "1px solid var(--border-soft)" : "none" }}>
                    <span className="mono" style={{ fontSize: 12.5, color: "var(--text)" }}>{r[0]}</span>
                    <span style={{ fontSize: 10.5, color: r[1] === "ingested" ? "var(--good)" : "var(--text-3)" }}>{r[1]}</span>
                  </div>
                ))}
              </div>
            )}
        </div>
      </div>
      <div><ReplayButton onReplay={replay}>replay fetch</ReplayButton></div>
    </div>
  );
}

function InlineErrorDemo() {
  const [val, setVal] = useState("sales jan 2026");
  const invalid = /[^a-z0-9_]/.test(val) || val.length === 0;
  const [drawerErr, setDrawerErr] = useState(true);
  return (
    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 22 }}>
      {/* field-level */}
      <div>
        <SubHead>variant="field" — under an input</SubHead>
        <div style={{ background: "var(--panel)", border: "1px solid var(--border)", borderRadius: "var(--radius)", padding: 16 }}>
          <label style={{ fontSize: 11, color: "var(--text-3)", letterSpacing: ".04em", display: "block", marginBottom: 6 }}>SOURCE NAME</label>
          <input value={val} onChange={e => setVal(e.target.value)} spellCheck={false} className="mono" style={{ width: "100%", background: "var(--panel-3)", border: `1px solid ${invalid ? "rgba(248,113,113,.5)" : "var(--border)"}`, borderRadius: "var(--radius)", padding: "8px 11px", color: "var(--text)", fontSize: 13, outline: "none" }} />
          <InlineError>{invalid ? "Lowercase letters, digits and underscores only — no spaces." : null}</InlineError>
          <div style={{ marginTop: 10, fontSize: 11, color: "var(--text-4)" }}>Try typing a space or capital — it clears itself when valid.</div>
        </div>
      </div>
      {/* panel-level */}
      <div>
        <SubHead>variant="panel" — inside a drawer section</SubHead>
        <div style={{ background: "var(--panel)", border: "1px solid var(--border)", borderRadius: "var(--radius)", padding: 16 }}>
          <div style={{ fontSize: 13, color: "var(--text)", fontWeight: 500, marginBottom: 4 }}>Column type migration</div>
          <div style={{ fontSize: 12, color: "var(--text-3)", marginBottom: 12 }}>amount · float → decimal(12,2)</div>
          {drawerErr
            ? <InlineError variant="panel" onDismiss={() => setDrawerErr(false)}>Migration failed: 3 rows could not be cast. The source is unchanged — fix the values or pick a wider type, then retry.</InlineError>
            : <div style={{ fontSize: 11.5, color: "var(--text-4)", fontStyle: "italic" }}>Dismissed. (This path used to be console.error-only — a silent failure.)</div>}
          <div style={{ marginTop: 12, display: "flex", gap: 8 }}>
            <Btn size="sm" variant="default" onClick={() => setDrawerErr(true)}>Retry</Btn>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ──────────────────────────────────────────────────────────────────────────
   PAGE
   ────────────────────────────────────────────────────────────────────────── */
function Section({ id, children }) {
  return <section id={id} style={{ display: "flex", flexDirection: "column", gap: 20, scrollMarginTop: 24 }}>{children}</section>;
}

function Card({ children }) {
  return <div style={{ background: "var(--panel)", border: "1px solid var(--border)", borderRadius: "var(--radius-lg)", padding: 24, display: "flex", flexDirection: "column", gap: 20 }}>{children}</div>;
}

function App() {
  return (
    <div style={{ maxWidth: 960, margin: "0 auto", padding: "56px 28px 120px" }}>

      {/* Masthead */}
      <header style={{ display: "flex", flexDirection: "column", gap: 18, marginBottom: 44 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="3" width="8" height="8" rx="2" fill="var(--accent)" />
            <rect x="13" y="3" width="8" height="8" rx="2" fill="var(--accent)" opacity=".5" />
            <rect x="3" y="13" width="8" height="8" rx="2" fill="var(--accent)" opacity=".5" />
            <rect x="13" y="13" width="8" height="8" rx="2" fill="var(--accent)" />
          </svg>
          <span style={{ fontSize: 14, fontWeight: 600, letterSpacing: ".02em" }}>pipeui</span>
          <span style={{ width: 1, height: 14, background: "var(--border)" }} />
          <span className="mono" style={{ fontSize: 12, color: "var(--text-3)" }}>ui.jsx · window.__UI__</span>
        </div>

        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          <Eyebrow>Component Spec · Session 1</Eyebrow>
          <h1 style={{ fontSize: 34, fontWeight: 600, letterSpacing: "-.02em", lineHeight: 1.12 }}>Shared UI primitives — loading &amp; error surfacing</h1>
          <p style={{ fontSize: 15, color: "var(--text-2)", maxWidth: 680, lineHeight: 1.6 }}>
            Three new primitives and one decision rule, to replace the ad-hoc <span className="mono" style={{ color: "var(--text)" }}>"Loading…"</span> divs and inconsistent error handling scattered across screens. Every component below is <strong style={{ color: "var(--text)", fontWeight: 600 }}>rendered live</strong> — what you see is the intended behaviour. Claude Code implements from the specs.
          </p>
        </div>

        <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginTop: 4 }}>
          {[["Spinner", "#7c6cf5"], ["LoadingState", "#7c6cf5"], ["InlineError", "#f87171"], ["Error rule", "#a0a0aa"]].map(([t, c]) => (
            <span key={t} className="mono" style={{ fontSize: 11.5, padding: "4px 11px", borderRadius: 99, background: "var(--panel)", border: "1px solid var(--border)", color: "var(--text-2)", display: "inline-flex", alignItems: "center", gap: 7 }}>
              <span style={{ width: 7, height: 7, borderRadius: 99, background: c }} />{t}
            </span>
          ))}
        </div>
      </header>

      {/* Constraints banner */}
      <div style={{ display: "flex", gap: 12, alignItems: "flex-start", padding: "14px 16px", background: "var(--accent-soft)", border: "1px solid var(--accent-line)", borderRadius: "var(--radius)", marginBottom: 44 }}>
        <Icon name="check" size={15} style={{ color: "var(--accent)", marginTop: 1 }} />
        <div style={{ fontSize: 12.5, color: "var(--text-2)", lineHeight: 1.6 }}>
          <strong style={{ color: "var(--text)", fontWeight: 600 }}>Constraints honoured throughout.</strong> Inline styles only — no CSS classes, no stylesheet additions. No new dependencies. The <span className="mono" style={{ color: "var(--text)" }}>Spinner</span> animates via SVG <span className="mono" style={{ color: "var(--text)" }}>&lt;animateTransform&gt;</span>, so it needs no <span className="mono" style={{ color: "var(--text)" }}>@keyframes</span>. All four live on <span className="mono" style={{ color: "var(--text)" }}>window.__UI__</span> alongside the existing primitives.
        </div>
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 56 }}>

        {/* ITEM 1 */}
        <Section id="spinner">
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            <Eyebrow>Item 1 · a</Eyebrow>
            <h2 style={{ fontSize: 23, fontWeight: 600, letterSpacing: "-.01em" }}>Spinner</h2>
            <p style={{ fontSize: 14, color: "var(--text-2)", maxWidth: 720, lineHeight: 1.6 }}>A compact "working" signal for inside buttons, beside labels, or anywhere a tight progress cue is needed. Colour comes from context: the default <span className="mono" style={{ color: "var(--text)" }}>currentColor</span> means dropping it inside a <span className="mono" style={{ color: "var(--text)" }}>Btn</span> makes it adopt the button's ink automatically.</p>
          </div>

          <Card>
            <Preview label="Live"><SpinnerDemo /></Preview>

            <Block>
              <SubHead>Props</SubHead>
              <PropsTable rows={[
                ["size", "number", "14", "Px width/height. 14 fits a md Btn; bump to 20–32 standalone."],
                ["color", "string", "\"currentColor\"", "Any colour or CSS var. Inherits the surrounding text colour by default."],
                ["strokeWidth", "number", "2", "Ring thickness. Scale up (2.5–3) at larger sizes."],
              ]} />
            </Block>

            <Block>
              <SubHead>Tokens & behaviour</SubHead>
              <div style={{ fontSize: 13, color: "var(--text-2)", lineHeight: 1.65 }}>
                Colour is caller-supplied — pass a token when standalone (<span className="mono" style={{ color: "var(--text)" }}>var(--text-3)</span> for neutral, <span className="mono" style={{ color: "var(--text)" }}>var(--accent)</span> / <span className="mono" style={{ color: "var(--text)" }}>var(--run)</span> for emphasis). A faint full ring at <span className="mono" style={{ color: "var(--text)" }}>strokeOpacity 0.22</span> sits under a ~30%-length rotating arc, 0.7s linear loop. <span style={{ color: "var(--text-3)" }}>No layout shift — it's a fixed-size inline-block SVG.</span>
              </div>
            </Block>

            <Block>
              <SubHead>Implementation</SubHead>
              <Code text={SNIPPETS.spinner} />
            </Block>
          </Card>
        </Section>

        {/* ITEM 1b */}
        <Section id="loadingstate">
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            <Eyebrow>Item 1 · b</Eyebrow>
            <h2 style={{ fontSize: 23, fontWeight: 600, letterSpacing: "-.01em" }}>LoadingState</h2>
            <p style={{ fontSize: 14, color: "var(--text-2)", maxWidth: 720, lineHeight: 1.6 }}>The full-panel placeholder that replaces every ad-hoc <span className="mono" style={{ color: "var(--text)" }}>"Loading…"</span> div. Centred and muted so a fetching list and the <span className="mono" style={{ color: "var(--text)" }}>DataTable</span> "No data yet" empty-state read as the same family.</p>
          </div>

          <Card>
            <Preview label="Live · auto-replays"><LoadingStateDemo /></Preview>

            <Block>
              <SubHead>Props</SubHead>
              <PropsTable rows={[
                ["label", "string", "\"Loading…\"", "Override per context — \"Loading sources…\", \"Loading functions…\"."],
                ["size", "number", "22", "Spinner px. The standalone default; rarely changed."],
              ]} />
            </Block>

            <Block>
              <SubHead>Tokens used</SubHead>
              <TokenChips tokens={["--text-3"]} />
              <div style={{ fontSize: 12.5, color: "var(--text-3)", lineHeight: 1.6, marginTop: 4 }}>Spinner + label both at <span className="mono">--text-3</span> · 40px vertical padding · 12px label, .02em tracking — matches the empty-state weight.</div>
            </Block>

            <Block>
              <SubHead>Implementation</SubHead>
              <Code text={SNIPPETS.loadingState} />
            </Block>
          </Card>
        </Section>

        {/* ITEM 2 */}
        <Section id="error-rule">
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            <Eyebrow>Item 2 · a</Eyebrow>
            <h2 style={{ fontSize: 23, fontWeight: 600, letterSpacing: "-.01em" }}>Error surfacing — the decision rule</h2>
            <p style={{ fontSize: 14, color: "var(--text-2)", maxWidth: 720, lineHeight: 1.6 }}>Today errors are split three ways — <span className="mono" style={{ color: "var(--text)" }}>Flash</span> toast, <span className="mono" style={{ color: "var(--text)" }}>console.error</span>-only (invisible), and form errors crammed into the toast. One rule, applied everywhere:</p>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 14 }}>
            {[
              { t: "Flash (toast)", c: "var(--run)", when: "Use for", body: "Transient, system-level outcomes not bound to a visible control — network failures, request-level server errors, and success confirmations. Fires bottom-right, auto-dismisses.", egl: "Use when the cause may scroll out of view", eg: "flash(\"Network error during ingestion.\", \"error\")" },
              { t: "InlineError", c: "var(--bad)", when: "Use for", body: "Errors tied to a specific field, form, or panel the user is working in — validation, and failed actions whose context is still on screen. Persists at the cause until corrected or dismissed.", egl: "Anchored to what went wrong", eg: "<InlineError variant=\"panel\">Migration failed…</InlineError>" },
              { t: "console.error", c: "var(--text-3)", when: "Never alone", body: "Acceptable only as an additional developer log. Every failure that blocks or changes what the user sees must also surface via Flash or InlineError.", egl: "The column-migration silent paths are bugs", eg: "// add InlineError in the drawer, keep the log" },
            ].map(col => (
              <div key={col.t} style={{ background: "var(--panel)", border: "1px solid var(--border)", borderRadius: "var(--radius-lg)", padding: 18, display: "flex", flexDirection: "column", gap: 11 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ width: 9, height: 9, borderRadius: 99, background: col.c }} />
                  <span className="mono" style={{ fontSize: 13, color: "var(--text)", fontWeight: 500 }}>{col.t}</span>
                </div>
                <div style={{ fontSize: 10, letterSpacing: ".1em", textTransform: "uppercase", color: "var(--text-4)", fontWeight: 600 }}>{col.when}</div>
                <div style={{ fontSize: 12.5, color: "var(--text-2)", lineHeight: 1.6 }}>{col.body}</div>
                <div style={{ marginTop: "auto", paddingTop: 10, borderTop: "1px solid var(--border-soft)", display: "flex", flexDirection: "column", gap: 7 }}>
                  <div style={{ fontSize: 11, color: "var(--text-3)", fontStyle: "italic" }}>{col.egl}</div>
                  <code className="mono" style={{ fontSize: 10.5, color: "var(--text-3)", background: "#0a0a0c", border: "1px solid var(--border-soft)", borderRadius: 4, padding: "6px 8px", lineHeight: 1.45, display: "block", wordBreak: "break-word" }}>{col.eg}</code>
                </div>
              </div>
            ))}
          </div>
        </Section>

        {/* ITEM 2b */}
        <Section id="inlineerror">
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            <Eyebrow>Item 2 · b</Eyebrow>
            <h2 style={{ fontSize: 23, fontWeight: 600, letterSpacing: "-.01em" }}>InlineError</h2>
            <p style={{ fontSize: 14, color: "var(--text-2)", maxWidth: 720, lineHeight: 1.6 }}>One component, two placements. <span className="mono" style={{ color: "var(--text)" }}>variant="field"</span> is bare icon + text that tucks under an input; <span className="mono" style={{ color: "var(--text)" }}>variant="panel"</span> is a tinted block for drawer sections and failed actions. Auto-clears when its content goes falsy.</p>
          </div>

          <Card>
            <Preview label="Live · interactive" pad={22}><InlineErrorDemo /></Preview>

            <Block>
              <SubHead>Props</SubHead>
              <PropsTable rows={[
                ["children", "node", "—", "The message. Falsy → renders nothing, so it auto-clears on a valid input."],
                ["variant", "\"field\" | \"panel\"", "\"field\"", "field: bare, under inputs. panel: tinted block, in drawers/actions."],
                ["onDismiss", "function", "undefined", "Shows a close affordance. Omit for validation that should clear itself."],
                ["style", "object", "undefined", "Escape hatch for spacing in unusual layouts."],
              ]} />
            </Block>

            <Block>
              <SubHead>Tokens used</SubHead>
              <TokenChips tokens={["--bad", "--radius"]} />
              <div style={{ fontSize: 12.5, color: "var(--text-3)", lineHeight: 1.6, marginTop: 4 }}>Text & icon at <span className="mono">--bad</span>, reusing the existing <span className="mono">warn</span> glyph from <span className="mono">Icon</span>. Panel variant adds a 10%/35% <span className="mono">--bad</span> tint + border at <span className="mono">--radius</span> — deliberately quieter than the <span className="mono">Flash</span> toast since it doesn't need to grab attention from across the screen.</div>
            </Block>

            <Block>
              <SubHead>Implementation</SubHead>
              <Code text={SNIPPETS.inlineError} />
            </Block>
          </Card>
        </Section>

        {/* Export footer */}
        <Section id="export">
          <Card>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              <SubHead>Export — all four join the existing registry</SubHead>
              <Code text={SNIPPETS.exportReg} />
            </div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 10, fontSize: 12, color: "var(--text-3)" }}>
              <span style={{ display: "inline-flex", alignItems: "center", gap: 6 }}><Icon name="check" size={13} style={{ color: "var(--good)" }} /> Inline styles only</span>
              <span style={{ display: "inline-flex", alignItems: "center", gap: 6 }}><Icon name="check" size={13} style={{ color: "var(--good)" }} /> Zero new dependencies</span>
              <span style={{ display: "inline-flex", alignItems: "center", gap: 6 }}><Icon name="check" size={13} style={{ color: "var(--good)" }} /> No stylesheet additions</span>
              <span style={{ display: "inline-flex", alignItems: "center", gap: 6 }}><Icon name="check" size={13} style={{ color: "var(--good)" }} /> Tokens reused, none introduced</span>
            </div>
          </Card>
        </Section>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
